<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Web App Mimicry: Hard-lock viewport to prevent pinch-to-zoom and zooming on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Immersive Pool Engine</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --header-black: #000000;
            --text-high-contrast: #ffffff;
            --danger-red: #ff3333;
            --card-bg: rgba(26, 26, 26, 0.85); /* Slightly transparent for background bleed */
            --accent: #4a90e2;
            --border-color: #333;
        }
        
        * { box-sizing: border-box; }
        
        /* --- MILITARY-GRADE WEB RESTRICTION CSS --- */
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-high-contrast);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            
            overscroll-behavior-y: none; /* Block Mobile Swipe-to-Refresh */
            -webkit-touch-callout: none; /* Block iOS context menu/popups */
            -webkit-user-select: none;   /* Block Selection Safari */
            -moz-user-select: none;      /* Block Selection Firefox */
            -ms-user-select: none;       /* Block Selection IE/Edge */
            user-select: none;           /* Block Selection Standard */
        }

        /* Safety Clause: Re-enable text selection for actual form inputs ONLY */
        input, textarea, select {
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
            user-select: auto;
        }
        /* ------------------------------------------ */

        /* BACKGROUND OVERLAY MATRIX */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://ik.imagekit.io/silentgamers/6d37cee8dd5105cda3fb25fa287c1819.jpg?updatedAt=1760167768059&ik-s=47f862d8c94abb4a628fcb722d38992f87cd6c88') center/cover no-repeat;
            opacity: 0.15; /* Dark transparent opacity overlay */
            z-index: -1;
        }

        /* 1. CORPORATE HEADER (Logo Removed, Left Avatar Updated) */
        #app-header {
            position: relative; width: 100%; height: 68px;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .header-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            margin-left: 12px; object-fit: cover; border: 1px solid #444;
        }

        /* 2. PERSISTENT NAVIGATION CONSOLE */
        #nav-console {
            position: sticky; top: 0; display: flex; width: 100%;
            background: rgba(17, 17, 17, 0.95); z-index: 100; border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
        }
        .nav-tab {
            flex: 1; padding: 16px 0; text-align: center; font-weight: 600;
            font-size: 14px; color: #666; border-bottom: 3px solid transparent;
            cursor: pointer; transition: color 0.3s;
        }
        .nav-tab.active { color: #fff; border-bottom: 3px solid var(--accent); }

        /* 3. VIEWPORT CONTAINERS */
        .tab-content { display: none; padding: 16px; max-width: 800px; margin: 0 auto; }
        .tab-content.active { display: block; }

        /* FORM SKELETON (Tab A) */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #aaa; font-weight: bold; }
        .form-group input[type="text"], .form-group input[type="tel"], .form-group select { 
            width: 100%; padding: 14px; border-radius: 6px; border: 1px solid var(--border-color); 
            background: rgba(0, 0, 0, 0.7); color: #fff; font-size: 16px; 
        }
        .btn-primary { 
            width: 100%; padding: 16px; background: var(--accent); color: #fff; 
            border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: opacity 0.2s;
        }
        .btn-primary:active { opacity: 0.8; }
        .btn-primary:disabled { background: #555; color: #aaa; cursor: not-allowed; opacity: 1; }
        .btn-secondary { background: #333; }
        .btn-secondary:disabled { background: #222; color: #555; cursor: not-allowed; }

        /* CAMERA UI */
        .camera-wrapper {
            width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 8px; 
            overflow: hidden; position: relative; border: 1px solid var(--border-color); margin-bottom: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        #cam-video { width: 100%; height: 100%; object-fit: cover; display: none; }
        #cam-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cam-controls { display: flex; gap: 8px; margin-bottom: 16px; }

        /* INVENTORY GRID */
        .rental-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px;
        }
        .rental-item {
            background: rgba(17, 17, 17, 0.8); border: 1px solid var(--border-color); padding: 12px; border-radius: 6px;
            display: flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .rental-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }

        /* LIVE POOL METRICS (Tab B) */
        .pool-grid { display: flex; flex-direction: column; gap: 12px; }
        .session-card {
            background: var(--card-bg); border-radius: 8px; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            transition: all 0.3s ease; border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        .session-card.critical { animation: pulse-red 1s infinite alternate; }
        @keyframes pulse-red {
            from { box-shadow: 0 0 0px 0px rgba(255, 51, 51, 0); border: 1px solid var(--border-color); }
            to { box-shadow: 0 0 15px 2px rgba(255, 51, 51, 0.6); border: 1px solid var(--danger-red); }
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .swimmer-info { display: flex; align-items: center; gap: 12px; }
        
        /* IMAGE RENDERER COMPONENT */
        .swimmer-thumb-wrapper {
            position: relative; width: 40px; height: 40px; border-radius: 50%;
            overflow: hidden; border: 1px solid #444; flex-shrink: 0; background: #000;
        }
        .swimmer-thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* FALLBACK IMAGE FILTER STYLES */
        .fallback-img { filter: grayscale(100%) blur(1.5px); opacity: 0.7; }
        .no-data-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--danger-red); font-size: 8px; font-weight: 900; 
            white-space: nowrap; z-index: 2; pointer-events: none;
            text-shadow: 0px 0px 2px rgba(0,0,0,0.8);
        }

        .swimmer-name { font-size: 18px; font-weight: bold; margin: 0; }
        .timer-display { font-size: 24px; font-family: monospace; font-weight: bold; color: #fff; }
        .critical .timer-display { color: var(--danger-red); }
        .card-actions { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .btn-add { background: #333; color: #fff; }
        .btn-end { background: var(--danger-red); color: #fff; }

        /* AUDIT DASHBOARD (Tab C) */
        .audit-panel { background: rgba(17, 17, 17, 0.9); padding: 24px; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; }
        .audit-panel input[type="date"] { 
            width: 100%; padding: 14px; margin-bottom: 16px; background: #000; color: #fff; 
            border: 1px solid var(--border-color); border-radius: 6px; font-size: 16px; color-scheme: dark;
        }
        .revenue-display { font-size: 48px; font-weight: 900; margin: 20px 0; color: var(--accent); }

        /* MODALS */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 9999; align-items: center; justify-content: center; padding: 16px;
        }
        .modal-content {
            background: #111; padding: 24px; text-align: center; border: 1px solid var(--border-color); 
            width: 100%; max-width: 400px; border-radius: 12px;
        }
        
        .invoice-details { text-align: left; background: #000; padding: 16px; border-radius: 8px; margin: 16px 0; font-family: monospace; font-size: 14px; }
        .invoice-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #aaa; }
        .invoice-total { display: flex; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #444; font-size: 18px; font-weight: bold; color: #fff; }
        .invoice-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin: 0 auto 16px auto; display: block; border: 2px solid #333; }

        .network-status {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: #ff9800; color: #000; padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: bold; display: none; z-index: 1000;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- SYSTEM INITIALIZATION MODAL -->
    <div id="modal-audio" class="modal-overlay" style="display:flex;">
        <div class="modal-content">
            <h2 style="margin-top: 0; text-transform: uppercase;">Raj Sports Stadium</h2>
            <button id="btn-initialize" class="btn-primary" style="margin-top: 20px;">Swimming pool access</button>
        </div>
    </div>

    <!-- INVOICE SUMMARY MODAL -->
    <div id="modal-invoice" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: #fff;">INVOICE SUMMARY</h2>
            <img id="inv-photo" class="invoice-img" src="" alt="Swimmer">
            <div class="invoice-details" id="inv-details"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="Router.closeModal('modal-invoice')">CANCEL</button>
                <button id="btn-dispatch-invoice" class="btn btn-primary" onclick="AppController.confirmEntry()">DISPATCH</button>
            </div>
        </div>
    </div>

    <!-- MID-SESSION RENTAL MODAL -->
    <div id="modal-mid-rental" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: #fff;">ADD RENTAL</h2>
            <div class="form-group" style="text-align: left; margin-bottom: 24px;">
                <label>Select Inventory Item:</label>
                <select id="mid-rental-select"></select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="Router.closeModal('modal-mid-rental')">CANCEL</button>
                <button id="btn-dispatch-mid-rental" class="btn btn-primary" onclick="AppController.submitMidRental()">ADD ITEM</button>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header id="app-header">
        <img src="https://ik.imagekit.io/silentgamers/Picsart_25-09-18_22-04-02-455.jpg?updatedAt=1758214916821&ik-s=f760e9821930d21a57e973b1b1b92ce3d7611815" class="header-avatar" alt="Avatar">
    </header>

    <!-- NAV CONSOLE -->
    <nav id="nav-console">
        <div class="nav-tab active" data-target="tab-entry">1. ENTRY</div>
        <div class="nav-tab" data-target="tab-pool">2. LIVE POOL</div>
        <div class="nav-tab" data-target="tab-audit">3. AUDIT</div>
    </nav>

    <!-- TAB 1: ENTRY PANEL -->
    <main id="tab-entry" class="tab-content active">
        <div class="form-group">
            <label>Security Snapshot (Mandatory)</label>
            <div class="camera-wrapper">
                <span id="cam-placeholder" style="color:#555; font-size: 12px;">Camera Offline</span>
                <video id="cam-video" autoplay playsinline></video>
                <img id="cam-preview" alt="Preview">
            </div>
            <div class="cam-controls">
                <button class="btn btn-primary btn-secondary" id="btn-start-cam" onclick="CameraEngine.start()">Open Camera</button>
                <button class="btn btn-primary hidden" id="btn-capture-cam" onclick="CameraEngine.capture()">Capture</button>
                <button class="btn btn-primary btn-secondary hidden" id="btn-retake-cam" onclick="CameraEngine.retake()">Retake</button>
            </div>
            <canvas id="compression-canvas" style="display:none;"></canvas>
        </div>

        <div class="form-group">
            <label>Swimmer Name</label>
            <input type="text" id="entry-name" placeholder="Enter Name">
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="entry-mobile" placeholder="10-digit number" maxlength="10">
        </div>
        <div class="form-group">
            <label>Base Entrance Fee (INR)</label>
            <select id="entry-fee">
                <option value="40">₹40 - Standard</option>
                <option value="50">₹50 - Premium</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Rental Inventory (Dynamic)</label>
            <div id="dynamic-rental-grid" class="rental-grid">
                <span style="color:#555; font-size:12px;">Fetching inventory...</span>
            </div>
        </div>

        <button id="btn-preview-invoice" class="btn-primary" onclick="AppController.previewInvoice()">REVIEW & START SESSION</button>
    </main>

    <!-- TAB 2: LIVE POOL TERMINAL -->
    <main id="tab-pool" class="tab-content pool-grid"></main>

    <!-- TAB 3: AUDIT TERMINAL -->
    <main id="tab-audit" class="tab-content">
        <div class="audit-panel">
            <h2 style="margin-top:0; color:#fff; font-size: 18px;">DAILY FINANCIAL LEDGER</h2>
            <p style="color:#888; font-size: 12px; margin-bottom: 20px;">Queries Column B (Entrance Revenue) only.</p>
            <input type="date" id="audit-date">
            <button class="btn-primary" onclick="AuditEngine.fetchData()">FETCH ANALYTICS</button>
            <div class="revenue-display" id="audit-revenue">₹0</div>
            <div id="audit-status" style="color: #666; font-size: 12px;">Select a date to query history.</div>
        </div>
    </main>

    <div id="network-status" class="network-status">OFFLINE - QUEUING DATA...</div>

    <!-- --- MILITARY-GRADE WEB RESTRICTION SCRIPT --- -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Block Context Menu & Drag and Drop globally
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('dragstart', e => e.preventDefault());

            // Block Copy, Cut, Paste (Safely exempted for inputs and selects)
            const preventClipboard = (e) => {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
                    e.preventDefault();
                }
            };
            ['copy', 'cut', 'paste'].forEach(evt => document.addEventListener(evt, preventClipboard));

            // Keyboard Lockdowns (Zooming + DevTools + Text Selection)
            document.addEventListener('keydown', e => {
                const key = e.key.toLowerCase();
                
                // Block Ctrl+A / Cmd+A (Select All) globally, except inside input tags
                if ((e.ctrlKey || e.metaKey) && key === 'a') {
                    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
                        e.preventDefault();
                    }
                }
                
                // Block Keyboard Zooming (Ctrl/Cmd + '+', '-', '=')
                if ((e.ctrlKey || e.metaKey) && (key === '=' || key === '-' || key === '+')) {
                    e.preventDefault();
                }

                // Block Inspect Element / DevTools
                if (key === 'f12') e.preventDefault(); // Block F12
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i', 'j', 'c'].includes(key)) {
                    e.preventDefault(); // Block Ctrl+Shift+I / J / C
                }
                if ((e.ctrlKey || e.metaKey) && key === 'u') {
                    e.preventDefault(); // Block View Source (Ctrl+U / Cmd+Alt+U)
                }
            }, { passive: false });

            // Block trackpad / mouse-wheel zooming
            document.addEventListener('wheel', e => {
                if (e.ctrlKey || e.metaKey) e.preventDefault();
            }, { passive: false });
        });
    </script>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDtKN3XTdXYFtCgHd3QKp-zDY7KpB5AZD-LWkSPZnlX6VlhcY554TKlcqFgeaHwUHsTw/exec";

        /* =========================================================================
           1. SPA POPSTATE HISTORY INTERCEPTOR MATRIX
           ========================================================================= */
        const Router = {
            stack: [],
            init() {
                history.pushState({ level: 0 }, document.title, location.href);
                window.addEventListener('popstate', (e) => {
                    if (this.stack.length > 0) {
                        const topModal = this.stack.pop();
                        document.getElementById(topModal).style.display = 'none';
                    } else {
                        history.pushState({ level: 0 }, document.title, location.href);
                    }
                });
            },
            openModal(id) {
                this.stack.push(id);
                history.pushState({ level: this.stack.length }, document.title, location.href);
                document.getElementById(id).style.display = 'flex';
            },
            closeModal(id) {
                if (this.stack.includes(id)) history.back(); 
            }
        };

        const WakeLockEngine = {
            wakeLock: null,
            async request() {
                if ('wakeLock' in navigator) {
                    try { this.wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
                }
            },
            release() {
                if (this.wakeLock) { this.wakeLock.release().then(() => { this.wakeLock = null; }); }
            }
        };

        const TabManager = {
            init() {
                const tabs = document.querySelectorAll('.nav-tab');
                tabs.forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        tabs.forEach(t => t.classList.remove('active'));
                        e.target.classList.add('active');
                        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                        document.getElementById(e.target.dataset.target).classList.add('active');

                        if(e.target.dataset.target === 'tab-pool') WakeLockEngine.request();
                        else WakeLockEngine.release();
                    });
                });
            }
        };

        const VoiceEngine = {
            isAuthorized: false,
            initHook() {
                document.getElementById('btn-initialize').addEventListener('click', () => {
                    const unlockUtterance = new SpeechSynthesisUtterance('');
                    window.speechSynthesis.speak(unlockUtterance);
                    this.isAuthorized = true;
                    document.getElementById('modal-audio').style.display = 'none';
                    Router.init(); 
                    TabManager.init();
                    InventoryEngine.fetch();
                    AuditEngine.initDateLimits();
                    AppController.syncActiveSessionsFromServer(); 
                });
            },
            dispatchAlert(customerName) {
                if (!this.isAuthorized) return;
                const msg = new SpeechSynthesisUtterance(`Attention! ${customerName} ka time poora ho chuka hai.`);
                msg.lang = 'hi-IN'; msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        };

        const CameraEngine = {
            stream: null,
            photoBase64: null,
            async start() {
                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    const video = document.getElementById('cam-video');
                    video.srcObject = this.stream;
                    video.style.display = 'block';
                    document.getElementById('cam-placeholder').style.display = 'none';
                    document.getElementById('cam-preview').style.display = 'none';
                    document.getElementById('btn-start-cam').classList.add('hidden');
                    document.getElementById('btn-capture-cam').classList.remove('hidden');
                    document.getElementById('btn-retake-cam').classList.add('hidden');
                } catch (err) { alert("Camera access denied."); }
            },
            capture() {
                const video = document.getElementById('cam-video');
                const canvas = document.getElementById('compression-canvas');
                const ctx = canvas.getContext('2d');
                const size = Math.min(video.videoWidth, video.videoHeight);
                const startX = (video.videoWidth - size) / 2;
                const startY = (video.videoHeight - size) / 2;
                canvas.width = 400; canvas.height = 400;
                ctx.drawImage(video, startX, startY, size, size, 0, 0, 400, 400);
                this.photoBase64 = canvas.toDataURL('image/jpeg', 0.75);
                this.stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
                const preview = document.getElementById('cam-preview');
                preview.src = this.photoBase64;
                preview.style.display = 'block';
                document.getElementById('btn-capture-cam').classList.add('hidden');
                document.getElementById('btn-retake-cam').classList.remove('hidden');
            },
            retake() {
                this.photoBase64 = null;
                this.start();
            }
        };

        const InventoryEngine = {
            items: [], 
            async fetch() {
                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?action=getRentalItems`);
                    const json = await response.json();
                    if(json.success && json.data) {
                        this.items = json.data;
                        this.render(this.items);
                    } else { this.render([]); }
                } catch (error) {
                    document.getElementById('dynamic-rental-grid').innerHTML = `<span style="color:var(--danger-red); font-size:12px;">Failed to load inventory. Check connection.</span>`;
                }
            },
            render(items) {
                const grid = document.getElementById('dynamic-rental-grid');
                grid.innerHTML = '';
                if(!items || items.length === 0) {
                    grid.innerHTML = '<span style="color:#555; font-size:12px;">No inventory found.</span>';
                    return;
                }
                items.forEach((item) => {
                    const label = document.createElement('label');
                    label.className = 'rental-item';
                    label.innerHTML = `<input type="checkbox" class="rental-chk" data-name="${item.name}" value="${item.fee}"> ${item.name} (₹${item.fee})`;
                    grid.appendChild(label);
                });
            }
        };

        const AuditEngine = {
            initDateLimits() {
                const input = document.getElementById('audit-date');
                const today = new Date();
                const threeMonthsAgo = new Date();
                threeMonthsAgo.setMonth(today.getMonth() - 3);
                input.max = today.toISOString().split('T')[0];
                input.min = threeMonthsAgo.toISOString().split('T')[0];
                input.value = today.toISOString().split('T')[0];
            },
            async fetchData() {
                const dateVal = document.getElementById('audit-date').value;
                const statusText = document.getElementById('audit-status');
                const revDisplay = document.getElementById('audit-revenue');
                if(!dateVal) return;
                statusText.innerText = "Querying ledger..."; revDisplay.innerText = "₹---";
                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?action=getAuditRevenue&date=${dateVal}`);
                    const data = await response.json();
                    revDisplay.innerText = `₹${data.revenue || 0}`;
                    statusText.innerText = `Ledger sync complete for ${dateVal}.`;
                } catch (err) {
                    statusText.innerText = "Error fetching data."; revDisplay.innerText = "₹ERR";
                }
            }
        };

        const workerCode = `
            let activeSessions = [];
            self.onmessage = function(e) { if (e.data.action === 'SYNC') { activeSessions = e.data.sessions; } };
            setInterval(() => {
                const now = new Date().getTime(); 
                const updates = []; const alerts = [];
                activeSessions.forEach(session => {
                    const msRemaining = session.targetEpoch - now;
                    const isCritical = msRemaining <= 180000 && msRemaining > 0;
                    const isExpired = msRemaining <= 0;
                    
                    if (isExpired && !session.alertFired) {
                        session.alertFired = true;
                        alerts.push({ id: session.id, name: session.name, type: 'EXPIRED' });
                    }
                    updates.push({ id: session.id, remaining: msRemaining, isCritical: isCritical, isExpired: isExpired });
                });
                self.postMessage({ type: 'TICK_UPDATE', payload: updates });
                if(alerts.length > 0) self.postMessage({ type: 'ALERTS', payload: alerts });
            }, 1000);
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const workerInstance = new Worker(URL.createObjectURL(blob));

        let liveStateGraph = []; 
        workerInstance.onmessage = function(e) {
            if (e.data.type === 'ALERTS') {
                e.data.payload.forEach(alert => { if(alert.type === 'EXPIRED') VoiceEngine.dispatchAlert(alert.name); }); return;
            }
            if(e.data.type === 'TICK_UPDATE') {
                const updates = e.data.payload;
                updates.sort((a, b) => a.remaining - b.remaining); 
                updates.forEach((update, index) => {
                    const card = document.getElementById(`session-${update.id}`);
                    if (card) {
                        card.style.order = index; 
                        const timerText = document.getElementById(`timer-${update.id}`);
                        if(timerText) {
                            if (update.isExpired) {
                                timerText.innerText = "TIME OVER";
                                timerText.style.color = "var(--danger-red)";
                            } else {
                                const totalSec = Math.floor(update.remaining / 1000);
                                const h = String(Math.floor(totalSec / 3600)).padStart(2, '0');
                                const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
                                const s = String(totalSec % 60).padStart(2, '0');
                                timerText.innerText = `${h}:${m}:${s}`;
                                timerText.style.color = update.isCritical ? "var(--danger-red)" : "#ffffff";
                            }
                        }
                        if (update.isCritical && !update.isExpired) { card.classList.add('critical'); } 
                        else { card.classList.remove('critical'); }
                    }
                });
            }
        };

        const NetworkManager = {
            queue: JSON.parse(localStorage.getItem('offlineQueue') || '[]'),
            init() {
                window.addEventListener('online', () => this.flushQueue());
                window.addEventListener('offline', () => { document.getElementById('network-status').style.display = 'block'; });
                if(navigator.onLine) this.flushQueue();
            },
            saveQueue() {
                localStorage.setItem('offlineQueue', JSON.stringify(this.queue));
                if(!navigator.onLine) document.getElementById('network-status').style.display = 'block';
            },
            async dispatch(payload) {
                if (!navigator.onLine) { this.queue.push(payload); this.saveQueue(); return; }
                try { await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } }); } 
                catch (error) { this.queue.push(payload); this.saveQueue(); }
            },
            async flushQueue() {
                document.getElementById('network-status').style.display = 'none';
                if (this.queue.length === 0) return;
                const currentQueue = [...this.queue]; this.queue = []; this.saveQueue();
                for (let payload of currentQueue) await this.dispatch(payload);
            }
        };

        const AppController = {
            currentDraft: null,
            activeRentalId: null,
            
            async syncActiveSessionsFromServer() {
                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?action=getActiveSessions`);
                    const json = await response.json();
                    
                    if (json.success && json.data) {
                        liveStateGraph = [];
                        document.getElementById('tab-pool').innerHTML = ''; 
                        
                        const fallbackURL = "https://ik.imagekit.io/silentgamers/Picsart_25-09-19_15-35-12-168.png?updatedAt=1758287986286&ik-s=2cfa91f2f64a6c332ff33f4cec367efbf4a8e29e";
                        
                        json.data.forEach(session => {
                            const safeDateStr = session.stopTimeStr + "+05:30";
                            const targetEpoch = new Date(safeDateStr).getTime();
                            
                            // Image Local Storage Retrieval
                            let storedPhoto = localStorage.getItem(`pool_photo_${session.mobile}`);
                            let isFallback = false;
                            
                            if (!storedPhoto) {
                                storedPhoto = fallbackURL;
                                isFallback = true;
                            }
                            
                            const sessionNode = { 
                                id: session.mobile, 
                                name: session.name, 
                                targetEpoch: targetEpoch, 
                                alertFired: false, 
                                photo: storedPhoto,
                                isFallback: isFallback
                            };
                            
                            liveStateGraph.push(sessionNode);
                            this.renderCard(sessionNode);
                        });
                        workerInstance.postMessage({ action: 'SYNC', sessions: liveStateGraph });
                    }
                } catch(e) {}
            },

            previewInvoice() {
                const btn = document.getElementById('btn-preview-invoice');
                btn.disabled = true;

                const name = document.getElementById('entry-name').value.trim();
                const mobile = document.getElementById('entry-mobile').value.trim();
                const baseFee = parseInt(document.getElementById('entry-fee').value);
                const photo = CameraEngine.photoBase64;

                if (!photo || !name || mobile.length !== 10) {
                    btn.disabled = false;
                    return alert("Please ensure Photo, Name, and exactly 10-digit Mobile are provided.");
                }

                let rentalQty = 0; let rentalTotal = 0; let rentalNames = [];
                document.querySelectorAll('.rental-chk:checked').forEach(chk => {
                    rentalQty++; rentalTotal += parseInt(chk.value);
                    rentalNames.push(`${chk.dataset.name} (₹${chk.value})`);
                });

                this.currentDraft = {
                    action: "createEntry", name: name, village: "Local", fee: baseFee, 
                    mobile: mobile, rentalQuantity: rentalQty, discount: false, rentalFee: rentalTotal,
                    photoData: photo
                };

                document.getElementById('inv-photo').src = photo;
                document.getElementById('inv-details').innerHTML = `
                    <div class="invoice-row"><span>Name:</span> <span>${name}</span></div>
                    <div class="invoice-row"><span>Mobile:</span> <span>${mobile}</span></div>
                    <div class="invoice-row"><span>Base Admission:</span> <span>₹${baseFee}</span></div>
                    ${rentalQty > 0 ? `<div class="invoice-row" style="color:#888; font-size:12px;">Rentals: ${rentalNames.join(', ')}</div>` : ''}
                    <div class="invoice-total"><span>GRAND TOTAL:</span> <span style="color:var(--accent);">₹${baseFee + rentalTotal}</span></div>
                `;

                btn.disabled = false;
                
                const dispatchBtn = document.getElementById('btn-dispatch-invoice');
                dispatchBtn.disabled = false;
                dispatchBtn.innerText = "DISPATCH";

                Router.openModal('modal-invoice');
            },

            confirmEntry() {
                const btn = document.getElementById('btn-dispatch-invoice');
                if(btn.disabled) return;
                btn.disabled = true;
                btn.innerText = "DISPATCHING...";

                const payload = this.currentDraft;
                const targetEpoch = new Date().getTime() + (60 * 60 * 1000);
                
                // Set to Local Storage immediately
                localStorage.setItem(`pool_photo_${payload.mobile}`, payload.photoData);

                const sessionNode = { 
                    id: payload.mobile, name: payload.name, 
                    targetEpoch: targetEpoch, alertFired: false, 
                    photo: payload.photoData, isFallback: false 
                };
                
                liveStateGraph.push(sessionNode);
                workerInstance.postMessage({ action: 'SYNC', sessions: liveStateGraph });
                this.renderCard(sessionNode);
                
                const dbPayload = { ...payload }; delete dbPayload.photoData; 
                NetworkManager.dispatch(dbPayload);

                document.getElementById('entry-name').value = '';
                document.getElementById('entry-mobile').value = '';
                document.querySelectorAll('.rental-chk').forEach(c => c.checked = false);
                CameraEngine.retake();

                setTimeout(() => {
                    Router.closeModal('modal-invoice');
                    document.querySelector('.nav-tab[data-target="tab-pool"]').click();
                }, 400); 
            },

            renderCard(session) {
                const grid = document.getElementById('tab-pool');
                const card = document.createElement('div');
                card.className = 'session-card';
                card.id = `session-${session.id}`;
                
                const fallbackClass = session.isFallback ? 'fallback-img' : '';
                const fallbackText = session.isFallback ? '<div class="no-data-text">NO DATA</div>' : '';

                card.innerHTML = `
                    <div class="card-header">
                        <div class="swimmer-info">
                            <div class="swimmer-thumb-wrapper">
                                <img src="${session.photo}" class="swimmer-thumb ${fallbackClass}">
                                ${fallbackText}
                            </div>
                            <h3 class="swimmer-name">${session.name}</h3>
                        </div>
                        <div class="timer-display" id="timer-${session.id}">--:--:--</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-add" onclick="AppController.addRental('${session.id}')">+ ADD RENTAL</button>
                        <button class="btn btn-end" onclick="AppController.endSession('${session.id}')">END</button>
                    </div>
                `;
                grid.appendChild(card);
            },

            addRental(id) {
                this.activeRentalId = id;
                const select = document.getElementById('mid-rental-select');
                
                if (InventoryEngine.items.length === 0) {
                    select.innerHTML = `<option value="0">No Items Loaded in Matrix</option>`;
                } else {
                    select.innerHTML = InventoryEngine.items.map(item => 
                        `<option value="${item.fee}" data-name="${item.name}">${item.name} (₹${item.fee})</option>`
                    ).join('');
                }
                
                const btn = document.getElementById('btn-dispatch-mid-rental');
                btn.disabled = false;
                btn.innerText = "ADD ITEM";
                
                Router.openModal('modal-mid-rental');
            },

            submitMidRental() {
                const btn = document.getElementById('btn-dispatch-mid-rental');
                if(btn.disabled) return;
                
                const id = this.activeRentalId;
                const session = liveStateGraph.find(s => s.id === id);
                if(!session) return;

                const select = document.getElementById('mid-rental-select');
                const selectedOption = select.options[select.selectedIndex];
                const fee = parseInt(selectedOption.value);
                const itemName = selectedOption.getAttribute('data-name');
                
                if(fee === 0 && !itemName) return alert("Inventory empty. Cannot assign.");

                btn.disabled = true;
                btn.innerText = "PROCESSING...";

                NetworkManager.dispatch({
                    action: "addMidSessionRental", 
                    name: session.name, 
                    mobile: id, 
                    additionalQty: 1, 
                    additionalFee: fee
                });

                setTimeout(() => {
                    Router.closeModal('modal-mid-rental');
                }, 400); 
            },

            endSession(id) {
                const session = liveStateGraph.find(s => s.id === id);
                if(!session) return;
                
                liveStateGraph = liveStateGraph.filter(s => s.id !== id);
                workerInstance.postMessage({ action: 'SYNC', sessions: liveStateGraph });
                
                // Clear from memory to prevent browser bloating
                localStorage.removeItem(`pool_photo_${id}`);
                
                const card = document.getElementById(`session-${id}`);
                if(card) card.remove();
                NetworkManager.dispatch({ action: "endSession", name: session.name, mobile: id });
            }
        };

        window.onload = () => {
            VoiceEngine.initHook();
            NetworkManager.init();
        };
    </script>
</body>
</html>
