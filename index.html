<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium Apex | OS</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0B0F19',
                        panel: '#151A26',
                        accent: '#3B82F6',
                        crimson: '#E11D48',
                        emerald: '#10B981',
                        amber: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; color: #F3F4F6; margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(21, 26, 38, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .slide-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0B0F19; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4B5563; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useMemo } = React;

// ============================================================================
// GLOBAL CONSTANTS (LIVE WEB APP LINK INJECTED)
// ============================================================================
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDtKN3XTdXYFtCgHd3QKp-zDY7KpB5AZD-LWkSPZnlX6VlhcY554TKlcqFgeaHwUHsTw/exec";

// SVG Icon Library
const Icons = {
    Lock: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
    User: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
    LogOut: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
    Phone: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
    Message: () => <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>,
    X: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
    Camera: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>,
    Plus: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
};

// ============================================================================
// API SERVICE
// ============================================================================
const apiCall = async (payload) => {
    try {
        const response = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        const json = await response.json();
        if(!json.success) throw new Error(json.error);
        return json.data;
    } catch (e) {
        console.error("API Error:", e);
        throw e;
    }
};

// ============================================================================
// MAIN APPLICATION SHELL
// ============================================================================
const App = () => {
    const [authState, setAuthState] = useState({ token: null, role: null, loading: true });

    useEffect(() => {
        const initAuth = async () => {
            const cachedToken = localStorage.getItem('stadium_session_token');
            if (cachedToken) {
                try {
                    const data = await apiCall({ action: 'verify_session', password: cachedToken });
                    setAuthState({ token: cachedToken, role: data.role, loading: false });
                } catch (e) {
                    localStorage.removeItem('stadium_session_token');
                    setAuthState({ token: null, role: null, loading: false });
                    alert("Session Expired or Password Changed. Please Log In Again.");
                }
            } else {
                setAuthState({ token: null, role: null, loading: false });
            }
        };
        initAuth();
    }, []);

    const handleLogin = (role, token) => {
        localStorage.setItem('stadium_session_token', token);
        setAuthState({ token, role, loading: false });
    };

    const handleLogout = () => {
        localStorage.removeItem('stadium_session_token');
        setAuthState({ token: null, role: null, loading: false });
    };

    if (authState.loading) return <div className="h-screen flex items-center justify-center bg-obsidian"><div className="w-8 h-8 border-4 border-accent border-t-transparent rounded-full animate-spin"></div></div>;

    if (!authState.token) return <LoginGateway onLogin={handleLogin} />;

    return (
        <div className="min-h-screen bg-obsidian flex flex-col">
            <TopNav role={authState.role} onLogout={handleLogout} />
            <main className="flex-1 p-6 overflow-hidden flex flex-col">
                {authState.role === 'Admin' && <AdminDashboard token={authState.token} />}
                {authState.role === 'Gym' && <GymManagement token={authState.token} role={authState.role} />}
                {authState.role === 'Badminton' && <BadmintonManagement token={authState.token} role={authState.role} />}
                {authState.role === 'Pool' && <SwimmingPool token={authState.token} />}
            </main>
        </div>
    );
};

// ============================================================================
// LOGIN GATEWAY
// ============================================================================
const LoginGateway = ({ onLogin }) => {
    const [pwd, setPwd] = useState('');
    const [loading, setLoading] = useState(false);
    const [err, setErr] = useState('');

    const submit = async (e) => {
        e.preventDefault();
        setLoading(true); setErr('');
        try {
            const data = await apiCall({ action: 'login', password: pwd });
            onLogin(data.role, pwd);
        } catch (error) {
            setErr("Invalid Access Code. Access Denied.");
        } finally {
            setLoading(false);
        }
    };

    return (
        <div className="h-screen flex items-center justify-center bg-obsidian relative overflow-hidden">
            <div className="absolute inset-0 z-0 opacity-20" style={{ backgroundImage: 'radial-gradient(circle at 50% 50%, #3B82F6 0%, transparent 50%)' }}></div>
            <div className="glass-panel p-10 rounded-2xl w-full max-w-md z-10 shadow-2xl border border-gray-800">
                <div className="text-center mb-8">
                    <h1 className="text-4xl font-bold text-white tracking-tight">STADIUM<span className="text-accent">APEX</span></h1>
                    <p className="text-gray-400 mt-2 text-sm">Secure Authentication Gateway</p>
                </div>
                <form onSubmit={submit} className="space-y-6">
                    <div>
                        <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-500"><Icons.Lock /></div>
                            <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} required placeholder="Enter Access Code (e.g., Admin123)" 
                                className="w-full pl-10 pr-4 py-3 bg-gray-900 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent transition-all" />
                        </div>
                    </div>
                    {err && <p className="text-crimson text-sm text-center font-medium bg-crimson/10 py-2 rounded">{err}</p>}
                    <button type="submit" disabled={loading} className="w-full bg-accent hover:bg-blue-600 text-white font-semibold py-3 rounded-lg transition-colors flex justify-center items-center shadow-lg">
                        {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "Verify & Access"}
                    </button>
                </form>
            </div>
        </div>
    );
};

// ============================================================================
// TOP NAVIGATION BAR
// ============================================================================
const TopNav = ({ role, onLogout }) => (
    <nav className="glass-panel px-6 py-4 flex justify-between items-center z-50 shadow-md">
        <div className="flex items-center space-x-3">
            <div className="w-8 h-8 bg-accent rounded-lg flex items-center justify-center font-bold text-white">
                {role.charAt(0)}
            </div>
            <span className="font-semibold tracking-wide text-lg text-white">STADIUM<span className="text-accent">APEX</span></span>
            <span className="bg-gray-800 text-gray-300 text-xs px-2 py-1 rounded ml-4 border border-gray-700 shadow-inner">Role: {role}</span>
        </div>
        <button onClick={onLogout} className="flex items-center space-x-2 text-crimson hover:bg-crimson hover:bg-opacity-10 px-4 py-2 rounded-lg transition-colors">
            <Icons.LogOut /> <span className="font-medium">Log Out</span>
        </button>
    </nav>
);

// ============================================================================
// MODULE 1: ADMIN DASHBOARD (Custom Native Chart Integration)
// ============================================================================
const AdminDashboard = ({ token }) => {
    const [data, setData] = useState({ gym: [], badminton: [], pool: [], logs: [] });
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        apiCall({ action: 'get_admin_data', token }).then(res => {
            setData({
                gym: formatSheetData(res.gym),
                badminton: formatSheetData(res.badminton),
                pool: formatSheetData(res.pool),
                logs: formatSheetData(res.logs)
            });
            setLoading(false);
        });
    }, [token]);

    const formatSheetData = (matrix) => {
        if (!matrix || matrix.length < 2) return [];
        const headers = matrix[0];
        return matrix.slice(1).map(row => {
            let obj = {};
            headers.forEach((h, i) => obj[h] = row[i]);
            return obj;
        });
    };

    const combinedMembers = useMemo(() => {
        const today = new Date();
        today.setHours(0,0,0,0);
        let all = [
            ...data.gym.map(m => ({ ...m, type: 'Gym' })), 
            ...data.badminton.map(m => ({ ...m, type: 'Badminton' }))
        ];
        
        return all.map(m => {
            if(!m.End_Date) return { ...m, daysLeft: 999 };
            const endDate = new Date(m.End_Date);
            const daysLeft = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            return { ...m, daysLeft };
        }).filter(m => m.Player_Name).sort((a, b) => a.daysLeft - b.daysLeft);
    }, [data.gym, data.badminton]);

    const getRowColor = (days) => {
        if (days <= 0) return 'bg-crimson bg-opacity-20 border-l-4 border-crimson';
        if (days <= 3) return 'bg-amber bg-opacity-20 border-l-4 border-amber';
        return 'border-l-4 border-transparent';
    };

    const actionDeactivate = async (type, id) => {
        if(!confirm("Are you sure you want to expire this user?")) return;
        const sheetName = type === 'Gym' ? 'Gym_Members' : 'Badminton_Members';
        await apiCall({ action: 'deactivate_member', sheetName, memberId: id, token });
        alert("Member Deactivated Successfully");
        window.location.reload();
    };

    if (loading) return <div className="text-white flex justify-center items-center h-full"><div className="animate-pulse flex items-center gap-3"><div className="w-6 h-6 border-2 border-accent border-t-transparent rounded-full animate-spin"></div> Loading Command Center Data...</div></div>;

    // Custom CSS Chart Logic
    const recentLogs = data.logs.slice(-30);
    const maxCollection = Math.max(...recentLogs.map(l => parseFloat(l.Daily_Total_Collection) || 0), 100);

    return (
        <div className="flex flex-col h-full space-y-6 overflow-y-auto pb-10">
            {/* Top Widgets */}
            <div className="grid grid-cols-3 gap-6">
                <div className="glass-panel p-6 rounded-xl border-t-4 border-accent shadow-lg relative overflow-hidden">
                    <p className="text-gray-400 text-sm font-medium">Total Active Gym</p>
                    <h2 className="text-4xl font-bold text-white mt-2">{data.gym.filter(g=>g.Status==='Active').length}</h2>
                </div>
                <div className="glass-panel p-6 rounded-xl border-t-4 border-emerald shadow-lg">
                    <p className="text-gray-400 text-sm font-medium">Total Active Badminton</p>
                    <h2 className="text-4xl font-bold text-white mt-2">{data.badminton.filter(b=>b.Status==='Active').length}</h2>
                </div>
                <div className="glass-panel p-6 rounded-xl border-t-4 border-cyan-400 shadow-lg">
                    <p className="text-gray-400 text-sm font-medium">Currently in Pool</p>
                    <h2 className="text-4xl font-bold text-white mt-2">{data.pool.length}</h2>
                </div>
            </div>

            {/* Combined View Table */}
            <div className="glass-panel flex-1 rounded-xl flex flex-col overflow-hidden shadow-lg min-h-[300px]">
                <div className="px-6 py-4 border-b border-gray-800 bg-panel flex justify-between items-center">
                    <h3 className="text-lg font-semibold text-white">Live Expiry Radar (All Departments)</h3>
                </div>
                <div className="flex-1 overflow-auto p-4 custom-scrollbar">
                    <table className="w-full text-left border-collapse">
                        <thead>
                            <tr className="text-gray-400 text-sm border-b border-gray-800">
                                <th className="pb-3 px-4 font-semibold">Member Name</th>
                                <th className="pb-3 px-4 font-semibold">Dept</th>
                                <th className="pb-3 px-4 font-semibold">End Date</th>
                                <th className="pb-3 px-4 font-semibold">Status / Days Left</th>
                                <th className="pb-3 px-4 text-right font-semibold">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {combinedMembers.map((m, idx) => (
                                <tr key={idx} className={`border-b border-gray-800/50 hover:bg-gray-800/80 transition-colors ${getRowColor(m.daysLeft)}`}>
                                    <td className="py-4 px-4 text-white font-medium">{m.Player_Name}</td>
                                    <td className="py-4 px-4 text-gray-300">
                                        <span className={`px-2 py-1 rounded text-xs ${m.type==='Gym' ? 'bg-blue-900/50 text-blue-300 border border-blue-800' : 'bg-emerald-900/50 text-emerald-300 border border-emerald-800'}`}>{m.type}</span>
                                    </td>
                                    <td className="py-4 px-4 text-gray-300">{new Date(m.End_Date).toLocaleDateString()}</td>
                                    <td className="py-4 px-4">
                                        {m.daysLeft <= 0 ? <span className="text-crimson font-bold">Expired ({Math.abs(m.daysLeft)}d ago)</span> :
                                         m.daysLeft <= 3 ? <span className="text-amber font-bold">Expiring ({m.daysLeft}d left)</span> :
                                         <span className="text-gray-400">{m.daysLeft} days left</span>}
                                    </td>
                                    <td className="py-4 px-4 text-right space-x-2 flex justify-end">
                                        <a href={`tel:${m.Mobile_Number}`} title="Call Player" className="p-2 bg-gray-800 hover:bg-gray-700 rounded text-accent transition"><Icons.Phone /></a>
                                        <a href={`https://wa.me/91${m.Mobile_Number}?text=Hello ${encodeURIComponent(m.Player_Name)}, This is a reminder that your membership at our Sports Complex is expiring on ${new Date(m.End_Date).toLocaleDateString()}. Please renew your subscription to avoid service interruption.`} 
                                           target="_blank" title="WhatsApp Reminder" className="p-2 bg-gray-800 hover:bg-gray-700 rounded text-emerald transition"><Icons.Message /></a>
                                        <button onClick={()=>actionDeactivate(m.type, m.Member_ID)} title="Deactivate" className="p-2 bg-gray-800 hover:bg-crimson hover:text-white rounded text-gray-400 transition"><Icons.X /></button>
                                    </td>
                                </tr>
                            ))}
                            {combinedMembers.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-gray-500">No members found in the database yet.</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>
            
            {/* Native Tailwind CSS Chart (Fail-Proof) */}
            <div className="glass-panel p-6 rounded-xl h-64 flex flex-col shadow-lg">
                <h3 className="text-lg font-semibold text-white mb-2">Master Ledger Revenue Trend (Past 30 Entries)</h3>
                {recentLogs.length > 0 ? (
                    <div className="flex-1 flex items-end justify-between gap-1 mt-4 border-b border-gray-700 relative">
                        {recentLogs.map((log, i) => {
                            const val = parseFloat(log.Daily_Total_Collection) || 0;
                            const heightPct = (val / maxCollection) * 100;
                            return (
                                <div key={i} className="flex-1 flex flex-col items-center group relative h-full justify-end">
                                    <div className="absolute -top-10 bg-gray-900 border border-gray-700 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity z-10 whitespace-nowrap shadow-lg">
                                        {new Date(log.Date_and_Month).toLocaleDateString()}: ₹{val}
                                    </div>
                                    <div className="w-full bg-accent rounded-t-sm transition-all duration-300 hover:bg-blue-400 relative" style={{ height: `${Math.max(heightPct, 2)}%` }}></div>
                                </div>
                            );
                        })}
                    </div>
                ) : (
                    <div className="flex-1 flex items-center justify-center text-gray-500">No financial data logged yet.</div>
                )}
            </div>
        </div>
    );
};

// ============================================================================
// SHARED SLIDING FORM COMPONENT
// ============================================================================
const SlidingForm = ({ isOpen, onClose, title, children }) => {
    if (!isOpen) return null;
    return (
        <div className="fixed inset-0 z-50 flex justify-end bg-black bg-opacity-60 backdrop-blur-sm transition-opacity">
            <div className="w-[450px] bg-panel h-full border-l border-gray-700 slide-in shadow-2xl flex flex-col">
                <div className="flex justify-between items-center p-6 border-b border-gray-800 bg-obsidian">
                    <h2 className="text-xl font-bold text-white">{title}</h2>
                    <button onClick={onClose} className="text-gray-400 hover:text-white bg-gray-800 hover:bg-gray-700 p-2 rounded-full transition-colors"><Icons.X /></button>
                </div>
                <div className="p-6 flex-1 overflow-y-auto custom-scrollbar">
                    {children}
                </div>
            </div>
        </div>
    );
};

// ============================================================================
// MODULE 2: GYM MANAGEMENT
// ============================================================================
const GymManagement = ({ token, role }) => {
    const [members, setMembers] = useState([]);
    const [isFormOpen, setIsFormOpen] = useState(false);
    const [submitting, setSubmitting] = useState(false);
    const [formData, setFormData] = useState({ name: '', phone: '', address: '', start: new Date().toISOString().split('T')[0], duration: '1 Month' });

    useEffect(() => { loadData(); }, []);
    const loadData = () => apiCall({ action: 'get_gym_data', token }).then(setMembers);

    const calcEnd = (start, duration) => {
        let d = new Date(start);
        const months = parseInt(duration.split(' ')[0]);
        d.setMonth(d.getMonth() + months);
        return d.toISOString().split('T')[0];
    };

    const submitForm = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        const payload = {
            Member_ID: 'GYM-' + Date.now(),
            Player_Name: formData.name,
            Mobile_Number: formData.phone,
            Address_Location: formData.address,
            Start_Date: formData.start,
            End_Date: calcEnd(formData.start, formData.duration),
            Status: 'Active',
            Total_Revenue_Generated: 0
        };
        await apiCall({ action: 'add_gym_member', data: payload, token });
        setIsFormOpen(false);
        setSubmitting(false);
        setFormData({ name: '', phone: '', address: '', start: new Date().toISOString().split('T')[0], duration: '1 Month' });
        loadData();
    };

    return (
        <div className="flex h-full gap-6">
            <div className="w-1/4 flex flex-col space-y-6">
                <div className="glass-panel p-6 rounded-xl border-t-4 border-accent shadow-lg">
                    <h3 className="text-lg font-bold text-white mb-2">Gym Overview</h3>
                    <p className="text-gray-400 text-sm">Active Members</p>
                    <p className="text-4xl font-bold text-white">{members.filter(m=>m.Status==='Active').length}</p>
                    <button onClick={()=>setIsFormOpen(true)} className="mt-6 w-full bg-accent hover:bg-blue-600 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-colors shadow-lg">
                        <Icons.Plus /> Register New Member
                    </button>
                </div>
            </div>
            <div className="w-3/4 glass-panel rounded-xl flex flex-col overflow-hidden shadow-lg">
                <div className="p-5 border-b border-gray-800 bg-panel text-white font-semibold">Member Database</div>
                <div className="flex-1 overflow-auto p-4 custom-scrollbar">
                    <table className="w-full text-left text-sm">
                        <thead className="text-gray-400 border-b border-gray-800 bg-gray-900/50">
                            <tr><th className="p-3 font-medium">Name</th><th className="p-3 font-medium">Phone</th><th className="p-3 font-medium">End Date</th><th className="p-3 font-medium">Status</th></tr>
                        </thead>
                        <tbody className="text-gray-200">
                            {members.map((m, i) => (
                                <tr key={i} className="border-b border-gray-800/50 hover:bg-gray-800/80 transition-colors">
                                    <td className="p-3 font-medium text-white">{m.Player_Name}</td><td className="p-3">{m.Mobile_Number}</td>
                                    <td className="p-3">{m.End_Date ? new Date(m.End_Date).toLocaleDateString() : 'N/A'}</td>
                                    <td className="p-3"><span className={`px-2 py-1 rounded text-xs border ${m.Status==='Active' ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800' : 'bg-crimson/20 text-crimson border-red-800'}`}>{m.Status}</span></td>
                                </tr>
                            ))}
                            {members.length === 0 && <tr><td colSpan="4" className="text-center py-8 text-gray-500">No members found.</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>

            <SlidingForm isOpen={isFormOpen} onClose={()=>setIsFormOpen(false)} title="Register Gym Member">
                <form onSubmit={submitForm} className="space-y-5">
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Full Name *</label><input required value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 focus:border-accent focus:ring-1 focus:ring-accent outline-none rounded-lg p-3 text-white transition-all" /></div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Mobile Number *</label><input required type="tel" pattern="[0-9]{10}" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value})} className="w-full bg-gray-900 border border-gray-700 focus:border-accent focus:ring-1 focus:ring-accent outline-none rounded-lg p-3 text-white transition-all" /></div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Residential Address *</label><input required value={formData.address} onChange={e=>setFormData({...formData, address: e.target.value})} className="w-full bg-gray-900 border border-gray-700 focus:border-accent focus:ring-1 focus:ring-accent outline-none rounded-lg p-3 text-white transition-all" /></div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Start Date *</label><input required type="date" value={formData.start} onChange={e=>setFormData({...formData, start: e.target.value})} className="w-full bg-gray-900 border border-gray-700 focus:border-accent outline-none rounded-lg p-3 text-white transition-all" /></div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Subscription Duration *</label>
                        <select value={formData.duration} onChange={e=>setFormData({...formData, duration: e.target.value})} className="w-full bg-gray-900 border border-gray-700 focus:border-accent outline-none rounded-lg p-3 text-white transition-all">
                            <option>1 Month</option><option>3 Months</option><option>6 Months</option><option>12 Months</option>
                        </select>
                    </div>
                    <div className="pt-4 p-4 bg-gray-800/50 rounded-lg border border-gray-700">
                        <p className="text-xs text-gray-400">Calculated Expiry Date:</p>
                        <p className="text-xl font-bold text-accent mt-1">{new Date(calcEnd(formData.start, formData.duration)).toLocaleDateString()}</p>
                    </div>
                    <button type="submit" disabled={submitting} className="w-full bg-accent hover:bg-blue-600 text-white font-bold py-3.5 rounded-lg mt-8 transition-colors shadow-lg">
                        {submitting ? "Registering..." : "Confirm Registration"}
                    </button>
                </form>
            </SlidingForm>
        </div>
    );
};

// ============================================================================
// MODULE 3: BADMINTON MANAGEMENT
// ============================================================================
const BadmintonManagement = ({ token, role }) => {
    const [members, setMembers] = useState([]);
    const [isFormOpen, setIsFormOpen] = useState(false);
    const [submitting, setSubmitting] = useState(false);
    const [formData, setFormData] = useState({ name: '', phone: '', category: 'Over 15', start: new Date().toISOString().split('T')[0] });

    useEffect(() => { loadData(); }, []);
    const loadData = () => apiCall({ action: 'get_badminton_data', token }).then(setMembers);

    const getFee = (cat) => cat === 'Over 15' ? 500 : cat === 'Under 15' ? 150 : 200;
    const calcEnd = (start) => {
        let d = new Date(start); d.setDate(d.getDate() + 30); return d.toISOString().split('T')[0];
    };

    const submitForm = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        const payload = {
            Member_ID: 'BAD-' + Date.now(), Player_Name: formData.name, Mobile_Number: formData.phone, Category: formData.category,
            Fee_Paid: getFee(formData.category), Start_Date: formData.start, End_Date: calcEnd(formData.start), Status: 'Active', Total_Revenue_Generated: 0
        };
        await apiCall({ action: 'add_badminton_member', data: payload, token });
        setIsFormOpen(false); setSubmitting(false); loadData();
        setFormData({ name: '', phone: '', category: 'Over 15', start: new Date().toISOString().split('T')[0] });
    };

    return (
        <div className="flex h-full gap-6">
            <div className="w-1/4 flex flex-col space-y-6">
                <div className="glass-panel p-6 rounded-xl border-t-4 border-emerald shadow-lg">
                    <h3 className="text-lg font-bold text-white mb-2">Badminton Overview</h3>
                    <p className="text-gray-400 text-sm">Active Players</p>
                    <p className="text-4xl font-bold text-emerald">{members.filter(m=>m.Status==='Active').length}</p>
                    <button onClick={()=>setIsFormOpen(true)} className="mt-6 w-full bg-emerald hover:bg-green-600 text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-colors shadow-lg">
                        <Icons.Plus /> Register Player
                    </button>
                </div>
            </div>
            <div className="w-3/4 glass-panel rounded-xl flex flex-col overflow-hidden shadow-lg">
                <div className="p-5 border-b border-gray-800 bg-panel text-white font-semibold">Player Database</div>
                <div className="flex-1 overflow-auto p-4 custom-scrollbar">
                    <table className="w-full text-left text-sm">
                        <thead className="text-gray-400 border-b border-gray-800 bg-gray-900/50">
                            <tr><th className="p-3 font-medium">Name</th><th className="p-3 font-medium">Category</th><th className="p-3 font-medium">End Date</th><th className="p-3 font-medium">Status</th></tr>
                        </thead>
                        <tbody className="text-gray-200">
                            {members.map((m, i) => (
                                <tr key={i} className="border-b border-gray-800/50 hover:bg-gray-800/80 transition-colors">
                                    <td className="p-3 font-medium text-white">{m.Player_Name}</td>
                                    <td className="p-3 text-gray-300">{m.Category}</td>
                                    <td className="p-3">{m.End_Date ? new Date(m.End_Date).toLocaleDateString() : 'N/A'}</td>
                                    <td className="p-3"><span className={`px-2 py-1 rounded text-xs border ${m.Status==='Active' ? 'bg-emerald-900/30 text-emerald-400 border-emerald-800' : 'bg-crimson/20 text-crimson border-red-800'}`}>{m.Status}</span></td>
                                </tr>
                            ))}
                            {members.length === 0 && <tr><td colSpan="4" className="text-center py-8 text-gray-500">No players found.</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>

            <SlidingForm isOpen={isFormOpen} onClose={()=>setIsFormOpen(false)} title="Register Badminton Player">
                <form onSubmit={submitForm} className="space-y-5">
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Full Name *</label><input required value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 outline-none focus:border-emerald rounded-lg p-3 text-white transition-all" /></div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Mobile Number *</label><input required type="tel" pattern="[0-9]{10}" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value})} className="w-full bg-gray-900 border border-gray-700 outline-none focus:border-emerald rounded-lg p-3 text-white transition-all" /></div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Player Category *</label>
                        <select value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value})} className="w-full bg-gray-900 border border-gray-700 outline-none focus:border-emerald rounded-lg p-3 text-white transition-all">
                            <option>Over 15</option><option>Under 15</option><option>Twice a Week</option>
                        </select>
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 font-semibold mb-1 block">Fee Auto-Calculation</label>
                        <input readOnly value={`₹${getFee(formData.category)}`} className="w-full bg-gray-800 border border-gray-700 rounded-lg p-3 text-emerald font-bold cursor-not-allowed opacity-80" />
                    </div>
                    <div><label className="text-xs text-gray-400 font-semibold mb-1 block">Start Date *</label><input required type="date" value={formData.start} onChange={e=>setFormData({...formData, start: e.target.value})} className="w-full bg-gray-900 border border-gray-700 outline-none focus:border-emerald rounded-lg p-3 text-white transition-all" /></div>
                    <button type="submit" disabled={submitting} className="w-full bg-emerald hover:bg-green-600 text-white font-bold py-3.5 rounded-lg mt-8 transition-colors shadow-lg">
                        {submitting ? "Registering..." : "Confirm Registration"}
                    </button>
                </form>
            </SlidingForm>
        </div>
    );
};

// ============================================================================
// MODULE 4: HIGH-SPEED SWIMMING POOL ENGINE
// ============================================================================
const SwimmingPool = ({ token }) => {
    const [swimmers, setSwimmers] = useState([]);
    const [metrics, setMetrics] = useState({ todayRev: 0, itemsOut: 0, discounts: 0 });

    const [form, setForm] = useState({ name: '', phone: '', costume: false, goggles: false, cap: false });
    const [discountStatus, setDiscountStatus] = useState(false);
    const [isChecking, setIsChecking] = useState(false);
    const [checkingIn, setCheckingIn] = useState(false);
    
    const videoRef = useRef(null);
    const [photoData, setPhotoData] = useState(null);

    useEffect(() => {
        const local = JSON.parse(localStorage.getItem('pool_active') || '[]');
        setSwimmers(local);
        const l_metrics = JSON.parse(localStorage.getItem('pool_metrics') || '{"todayRev":0,"itemsOut":0,"discounts":0}');
        setMetrics(l_metrics);
    }, []);

    useEffect(() => {
        localStorage.setItem('pool_active', JSON.stringify(swimmers));
        localStorage.setItem('pool_metrics', JSON.stringify(metrics));
    }, [swimmers, metrics]);

    useEffect(() => {
        const interval = setInterval(() => {
            const now = Date.now();
            setSwimmers(prev => prev.map(s => {
                const elapsed = Math.floor((now - s.entryTime) / 1000);
                const left = Math.max(3600 - elapsed, 0);
                
                if (left === 0 && !s.alarmTriggered) {
                    if ('speechSynthesis' in window) {
                        const msg = new SpeechSynthesisUtterance(`Attention! ${s.name}, aapka samay samapt ho gaya hai.`);
                        msg.rate = 0.9;
                        window.speechSynthesis.speak(msg);
                    }
                    return { ...s, timeLeft: left, alarmTriggered: true };
                }
                return { ...s, timeLeft: left };
            }));
        }, 1000);
        return () => clearInterval(interval);
    }, []);

    const initCamera = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoRef.current.srcObject = stream;
        } catch(e) { console.warn("Camera access denied", e); alert("Camera access required for this feature."); }
    };

    const takePhoto = () => {
        if(!videoRef.current) return;
        const canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 300;
        canvas.getContext('2d').drawImage(videoRef.current, 0, 0, 300, 300);
        setPhotoData(canvas.toDataURL('image/jpeg', 0.8));
        const stream = videoRef.current.srcObject;
        if(stream) stream.getTracks().forEach(t => t.stop());
    };

    const handlePhoneChange = async (e) => {
        const val = e.target.value;
        setForm({ ...form, phone: val });
        if(val.length === 10) {
            setIsChecking(true);
            try {
                const res = await apiCall({ action: 'pool_cross_check', mobile: val, token });
                setDiscountStatus(res.discount);
            } catch(e){}
            setIsChecking(false);
        } else {
            setDiscountStatus(false);
        }
    };

    const calcCurrentBill = () => {
        let base = 50; 
        if(discountStatus) base -= 10;
        if(form.costume) base += 30;
        if(form.goggles) base += 20;
        if(form.cap) base += 10;
        return base;
    };

    const checkIn = async () => {
        if(!form.name) return alert("Name is required");
        setCheckingIn(true);
        const entryId = 'POOL-' + Date.now();
        const bill = calcCurrentBill();
        
        if(photoData) {
            try { localStorage.setItem(`photo_${entryId}`, photoData); } catch(e){ console.warn("Storage full"); }
        }

        const newSwimmer = {
            id: entryId, name: form.name, phone: form.phone,
            entryTime: Date.now(), timeLeft: 3600, alarmTriggered: false, bill,
            hasPhoto: !!photoData
        };

        try {
            await apiCall({
                action: 'pool_check_in', token, data: {
                    Entry_ID: entryId, Player_Name: form.name, Mobile_Number: form.phone,
                    Entry_Time: new Date().toISOString(), Local_Photo_Path: 'LOCAL',
                    Is_Discount_Applied: discountStatus, Final_Bill_Amount: bill
                }
            });

            setSwimmers([...swimmers, newSwimmer]);
            setMetrics(m => ({ ...m, todayRev: m.todayRev + bill, discounts: m.discounts + (discountStatus?1:0) }));
            setForm({ name: '', phone: '', costume: false, goggles: false, cap: false });
            setPhotoData(null);
            setDiscountStatus(false);
        } catch(e) {
            alert("Network error processing Check-in.");
        } finally {
            setCheckingIn(false);
        }
    };

    const exitSwimmer = (id) => {
        apiCall({ action: 'pool_exit', entryId: id, token });
        localStorage.removeItem(`photo_${id}`);
        setSwimmers(swimmers.filter(s => s.id !== id));
        window.speechSynthesis.cancel(); 
    };

    const addMidSessionItem = (id, price, item) => {
        apiCall({ action: 'pool_update_items', data: { Entry_ID: id, addedAmount: price, Item_Name: item }, token });
        setSwimmers(swimmers.map(s => s.id === id ? { ...s, bill: s.bill + price } : s));
        setMetrics(m => ({ ...m, todayRev: m.todayRev + price, itemsOut: m.itemsOut + 1 }));
    };

    const formatTime = (secs) => {
        const m = Math.floor(secs / 60).toString().padStart(2, '0');
        const s = (secs % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    };

    return (
        <div className="flex h-full gap-5">
            <div className="w-[30%] glass-panel rounded-xl p-6 flex flex-col shadow-lg overflow-y-auto custom-scrollbar">
                <h3 className="text-xl font-bold text-white mb-5 border-b border-gray-800 pb-3 flex items-center gap-2">
                    Gatekeeper Terminal
                </h3>
                
                <div className="space-y-5 flex-1">
                    <div>
                        <label className="text-xs text-gray-400 font-semibold mb-1 block">Player Name *</label>
                        <input required value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full bg-gray-900 border border-gray-700 outline-none focus:border-cyan-500 rounded-lg p-3 text-white transition-all" placeholder="Enter Swimmer Name" />
                    </div>
                    <div>
                        <label className="text-xs text-gray-400 font-semibold mb-1 flex justify-between"><span>Mobile Number</span> {isChecking && <span className="text-cyan-400 animate-pulse">Cross-checking...</span>}</label>
                        <input type="tel" maxLength="10" value={form.phone} onChange={handlePhoneChange} className="w-full bg-gray-900 border border-gray-700 outline-none focus:border-cyan-500 rounded-lg p-3 text-white transition-all" placeholder="Enter 10 digit number" />
                    </div>
                    
                    {discountStatus && (
                        <div className="bg-emerald-900/40 border border-emerald text-emerald-300 p-3 rounded-lg text-sm font-semibold shadow-lg animate-pulse flex items-center justify-center">
                            ✅ Active Member Verified: ₹10 Discount Unlocked
                        </div>
                    )}

                    <div className="border border-gray-700 rounded-lg p-4 bg-gray-900/50 shadow-inner">
                        <label className="text-xs text-gray-400 font-semibold mb-3 block text-center">Capture Swimmer Photo</label>
                        {!photoData ? (
                            <div className="flex flex-col items-center space-y-3">
                                <video ref={videoRef} autoPlay className="w-32 h-32 bg-black rounded-lg object-cover border border-gray-700"></video>
                                <div className="flex gap-2">
                                    <button onClick={initCamera} className="text-xs bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors">Start Cam</button>
                                    <button onClick={takePhoto} className="text-xs bg-accent hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow-lg transition-colors">Capture</button>
                                </div>
                            </div>
                        ) : (
                            <div className="flex flex-col items-center">
                                <img src={photoData} className="w-32 h-32 rounded-lg object-cover border-2 border-cyan-500 shadow-lg" />
                                <button onClick={()=>{setPhotoData(null); initCamera();}} className="text-xs text-crimson hover:text-red-400 mt-3 font-semibold transition-colors">Retake Photo</button>
                            </div>
                        )}
                    </div>

                    <div className="bg-gray-800/80 rounded-lg p-4 space-y-3 shadow-inner border border-gray-700">
                        <label className="text-xs text-gray-400 font-semibold border-b border-gray-700 pb-2 block">Rental Equipment</label>
                        <div className="grid grid-cols-1 gap-2 mt-2">
                            <label className="flex items-center space-x-3 text-white text-sm cursor-pointer hover:bg-gray-700 p-2 rounded transition-colors"><input type="checkbox" checked={form.costume} onChange={e=>setForm({...form, costume: e.target.checked})} className="w-4 h-4 accent-cyan-500 rounded" /><span>Swim Costume (+₹30)</span></label>
                            <label className="flex items-center space-x-3 text-white text-sm cursor-pointer hover:bg-gray-700 p-2 rounded transition-colors"><input type="checkbox" checked={form.goggles} onChange={e=>setForm({...form, goggles: e.target.checked})} className="w-4 h-4 accent-cyan-500 rounded" /><span>Goggles (+₹20)</span></label>
                            <label className="flex items-center space-x-3 text-white text-sm cursor-pointer hover:bg-gray-700 p-2 rounded transition-colors"><input type="checkbox" checked={form.cap} onChange={e=>setForm({...form, cap: e.target.checked})} className="w-4 h-4 accent-cyan-500 rounded" /><span>Swim Cap (+₹10)</span></label>
                        </div>
                    </div>
                </div>

                <div className="mt-6 pt-5 border-t border-gray-800">
                    <div className="flex justify-between items-end mb-4">
                        <span className="text-gray-400 font-medium">Total Balance Due:</span>
                        <div className="text-right flex items-center">
                            {discountStatus && <span className="text-gray-500 line-through text-lg mr-3">₹{calcCurrentBill() + 10}</span>}
                            <span className="text-4xl font-bold text-cyan-400">₹{calcCurrentBill()}</span>
                        </div>
                    </div>
                    <button onClick={checkIn} disabled={checkingIn} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl text-lg shadow-[0_0_20px_rgba(8,145,178,0.4)] transition-all">
                        {checkingIn ? "Processing..." : "AUTHORIZE CHECK-IN"}
                    </button>
                </div>
            </div>

            <div className="w-[45%] glass-panel rounded-xl p-5 flex flex-col shadow-lg">
                <h3 className="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2">Active Water Grid</h3>
                <div className="flex-1 overflow-y-auto custom-scrollbar grid grid-cols-2 gap-4 auto-rows-max pr-2">
                    {swimmers.map(s => (
                        <div key={s.id} className={`bg-gray-900 rounded-xl p-5 border relative overflow-hidden flex flex-col shadow-lg transition-colors ${s.timeLeft===0 ? 'border-crimson pulse-red bg-red-900/10' : 'border-gray-700 hover:border-gray-500'}`}>
                            <div className="flex items-center gap-3 mb-4 relative z-10">
                                {s.hasPhoto ? <img src={localStorage.getItem(`photo_${s.id}`) || ''} className="w-12 h-12 rounded-lg object-cover bg-black border border-gray-700" /> : <div className="w-12 h-12 bg-gray-800 rounded-lg border border-gray-700 flex items-center justify-center text-gray-500"><Icons.User /></div>}
                                <div>
                                    <h4 className="text-white font-bold truncate w-24 text-lg" title={s.name}>{s.name}</h4>
                                    <p className="text-xs font-semibold text-cyan-500 bg-cyan-900/30 px-2 py-0.5 rounded inline-block mt-1">Bill: ₹{s.bill}</p>
                                </div>
                            </div>
                            
                            <div className="flex-1 flex justify-center items-center my-3 relative z-10 bg-gray-950/50 rounded-lg py-3">
                                <div className={`text-4xl font-mono font-bold tracking-tighter ${s.timeLeft===0 ? 'text-crimson animate-bounce' : 'text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.3)]'}`}>
                                    {formatTime(s.timeLeft)}
                                </div>
                            </div>

                            <div className="flex justify-between mt-auto space-x-3 relative z-10 pt-2">
                                <button onClick={()=>addMidSessionItem(s.id, 20, 'Goggles')} className="flex-1 bg-gray-800 hover:bg-gray-700 text-xs py-2 rounded-lg text-gray-300 border border-gray-600 font-medium transition-colors shadow">+ Goggles</button>
                                <button onClick={()=>exitSwimmer(s.id)} className="flex-1 bg-crimson hover:bg-red-600 text-xs font-bold py-2 rounded-lg text-white shadow-[0_4px_14px_0_rgba(225,29,72,0.39)] transition-all">Clear & Exit</button>
                            </div>
                            <div className="absolute bottom-0 left-0 h-1.5 bg-cyan-600 transition-all duration-1000 ease-linear" style={{ width: `${(s.timeLeft/3600)*100}%`}}></div>
                        </div>
                    ))}
                    {swimmers.length === 0 && <div className="col-span-2 text-center text-gray-500 mt-32 flex flex-col items-center"><Icons.User /><p className="mt-2 text-lg">Pool is currently empty</p></div>}
                </div>
            </div>

            <div className="w-[25%] flex flex-col space-y-5">
                <div className="glass-panel p-6 rounded-xl border-t-4 border-cyan-400 shadow-lg relative overflow-hidden">
                    <p className="text-gray-400 text-sm font-semibold uppercase tracking-wider">Today's Pool Revenue</p>
                    <h2 className="text-5xl font-black text-white mt-3">₹{metrics.todayRev}</h2>
                </div>
                <div className="glass-panel p-6 rounded-xl border-t-4 border-amber shadow-lg">
                    <p className="text-gray-400 text-sm font-semibold uppercase tracking-wider">Active Rentals</p>
                    <h2 className="text-4xl font-bold text-white mt-3">{metrics.itemsOut} <span className="text-lg text-gray-500 font-normal">Items Out</span></h2>
                </div>
                <div className="glass-panel p-6 rounded-xl border-t-4 border-emerald shadow-lg">
                    <p className="text-gray-400 text-sm font-semibold uppercase tracking-wider">Cross-Check Discounts</p>
                    <h2 className="text-4xl font-bold text-white mt-3">{metrics.discounts} <span className="text-lg text-gray-500 font-normal">Granted</span></h2>
                </div>
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
