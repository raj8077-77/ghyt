<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <!-- STRICT MOBILE VIEWPORT: Prevents iOS auto-zoom on inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stadium Apex | Mobile OS</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        obsidian: '#0B0F19',
                        panel: '#151A26',
                        accent: '#3B82F6',
                        crimson: '#E11D48',
                        emerald: '#10B981',
                        amber: '#F59E0B',
                        cyanPool: '#06b6d4'
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    boxShadow: { 'mobile-up': '0 -4px 20px rgba(0, 0, 0, 0.5)' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B0F19; color: #F3F4F6; margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(21, 26, 38, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Mobile Specific Animations */
        .slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .pulse-red { animation: pulseRed 1.5s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.5); } 70% { box-shadow: 0 0 0 10px rgba(225, 29, 72, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); } }
        
        /* Hidden scrollbar for sleek horizontal scrolling */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useMemo } = React;

// GLOBAL CONSTANTS
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDtKN3XTdXYFtCgHd3QKp-zDY7KpB5AZD-LWkSPZnlX6VlhcY554TKlcqFgeaHwUHsTw/exec";

// SVG Icon Library
const Icons = {
    Lock: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>,
    User: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
    LogOut: () => <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" strokeWidth="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
    Phone: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
    Message: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>,
    X: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
    Plus: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
    Cart: () => <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>,
    Menu: () => <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" strokeWidth="2" fill="none"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
};

const apiCall = async (payload) => {
    try {
        const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const json = await response.json();
        if(!json.success) throw new Error(json.error);
        return json.data;
    } catch (e) { console.error("API Error:", e); throw e; }
};

// ============================================================================
// MAIN APP ROOT
// ============================================================================
const App = () => {
    const [authState, setAuthState] = useState({ token: null, role: null, loading: true });

    useEffect(() => {
        const initAuth = async () => {
            const cachedToken = localStorage.getItem('stadium_session_token');
            if (cachedToken) {
                try {
                    const data = await apiCall({ action: 'verify_session', password: cachedToken });
                    setAuthState({ token: cachedToken, role: data.role, loading: false });
                } catch (e) {
                    localStorage.removeItem('stadium_session_token');
                    setAuthState({ token: null, role: null, loading: false });
                    alert("Session Expired. Please Log In Again.");
                }
            } else { setAuthState({ token: null, role: null, loading: false }); }
        };
        initAuth();
    }, []);

    const handleLogin = (role, token) => {
        localStorage.setItem('stadium_session_token', token);
        setAuthState({ token, role, loading: false });
    };

    const handleLogout = () => {
        localStorage.removeItem('stadium_session_token');
        setAuthState({ token: null, role: null, loading: false });
    };

    if (authState.loading) return <div className="h-screen flex items-center justify-center bg-obsidian"><div className="w-10 h-10 border-4 border-accent border-t-transparent rounded-full animate-spin"></div></div>;
    if (!authState.token) return <LoginGateway onLogin={handleLogin} />;

    return (
        <div className="h-screen flex flex-col bg-obsidian overflow-hidden max-w-md mx-auto relative border-x border-gray-900 shadow-2xl">
            <TopNav role={authState.role} onLogout={handleLogout} />
            <main className="flex-1 overflow-y-auto hide-scroll pb-6 px-4 pt-4">
                {authState.role === 'Admin' && <AdminDashboard token={authState.token} />}
                {authState.role === 'Gym' && <GymManagement token={authState.token} role={authState.role} />}
                {authState.role === 'Badminton' && <BadmintonManagement token={authState.token} role={authState.role} />}
                {authState.role === 'Pool' && <SwimmingPool token={authState.token} />}
            </main>
        </div>
    );
};

// ============================================================================
// LOGIN GATEWAY (Optimized for Mobile)
// ============================================================================
const LoginGateway = ({ onLogin }) => {
    const [pwd, setPwd] = useState('');
    const [loading, setLoading] = useState(false);
    const [err, setErr] = useState('');

    const submit = async (e) => {
        e.preventDefault(); setLoading(true); setErr('');
        try {
            const data = await apiCall({ action: 'login', password: pwd });
            onLogin(data.role, pwd);
        } catch (error) { setErr("Invalid Access Code."); } 
        finally { setLoading(false); }
    };

    return (
        <div className="h-screen flex items-center justify-center bg-obsidian relative p-4">
            <div className="absolute inset-0 z-0 opacity-20" style={{ backgroundImage: 'radial-gradient(circle at 50% 50%, #3B82F6 0%, transparent 70%)' }}></div>
            <div className="glass-panel p-8 rounded-3xl w-full max-w-sm z-10 shadow-2xl border border-gray-800">
                <div className="text-center mb-8">
                    <div className="w-16 h-16 bg-accent rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg"><Icons.Lock /></div>
                    <h1 className="text-3xl font-black text-white tracking-tight">STADIUM<span className="text-accent">OS</span></h1>
                    <p className="text-gray-400 mt-2 text-sm">Staff Gateway</p>
                </div>
                <form onSubmit={submit} className="space-y-5">
                    <div>
                        <input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} required placeholder="Enter Access Code" 
                            className="w-full px-5 py-4 bg-gray-900 border border-gray-700 rounded-xl text-white text-lg text-center font-bold focus:outline-none focus:border-accent focus:ring-2 focus:ring-accent transition-all placeholder-gray-600" />
                    </div>
                    {err && <p className="text-crimson text-sm text-center font-bold bg-crimson/10 py-2 rounded-lg">{err}</p>}
                    <button type="submit" disabled={loading} className="w-full bg-accent hover:bg-blue-600 active:bg-blue-700 text-white font-bold py-4 rounded-xl text-lg transition-colors flex justify-center items-center shadow-lg">
                        {loading ? <div className="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : "Unlock OS"}
                    </button>
                </form>
            </div>
        </div>
    );
};

// ============================================================================
// MOBILE TOP NAV
// ============================================================================
const TopNav = ({ role, onLogout }) => {
    const [menuOpen, setMenuOpen] = useState(false);
    return (
        <nav className="glass-panel px-4 py-3 flex justify-between items-center z-40 sticky top-0 border-b border-gray-800">
            <div className="flex items-center space-x-3">
                <div className="w-10 h-10 bg-accent rounded-xl flex items-center justify-center font-black text-white text-lg shadow-md">{role.charAt(0)}</div>
                <div className="flex flex-col">
                    <span className="font-black tracking-tight text-white leading-none">STADIUM<span className="text-accent">OS</span></span>
                    <span className="text-accent text-xs font-bold uppercase tracking-wider mt-0.5">{role} Access</span>
                </div>
            </div>
            <button onClick={()=>setMenuOpen(!menuOpen)} className="p-2 text-gray-400 hover:text-white bg-gray-900 rounded-lg"><Icons.Menu /></button>
            
            {/* Mobile Dropdown */}
            {menuOpen && (
                <div className="absolute top-16 right-4 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl p-2 z-50 slide-up">
                    <button onClick={onLogout} className="flex items-center w-full space-x-3 text-crimson px-4 py-3 font-bold rounded-lg active:bg-gray-800">
                        <Icons.LogOut /> <span>Secure Logout</span>
                    </button>
                </div>
            )}
        </nav>
    );
};

// ============================================================================
// MOBILE BOTTOM SHEET COMPONENT (Replaces desktop right-slide modals)
// ============================================================================
const BottomSheet = ({ isOpen, onClose, title, children }) => {
    if (!isOpen) return null;
    return (
        <div className="fixed inset-0 z-50 flex flex-col justify-end bg-black/80 backdrop-blur-sm transition-opacity">
            <div className="w-full max-w-md mx-auto bg-panel rounded-t-3xl shadow-mobile-up border-t border-gray-700 flex flex-col max-h-[90vh] slide-up">
                <div className="flex justify-between items-center p-5 border-b border-gray-800 shrink-0">
                    <h2 className="text-xl font-bold text-white">{title}</h2>
                    <button onClick={onClose} className="p-2 bg-gray-800 rounded-full text-gray-400 active:bg-gray-700"><Icons.X /></button>
                </div>
                <div className="p-5 overflow-y-auto hide-scroll flex-1">
                    {children}
                </div>
            </div>
        </div>
    );
};

// ============================================================================
// MODULE 1: ADMIN DASHBOARD (Mobile Optimized Layout)
// ============================================================================
const AdminDashboard = ({ token }) => {
    const [data, setData] = useState({ gym: [], badminton: [], pool: [], logs: [] });
    const [loading, setLoading] = useState(true);

    useEffect(() => {
        apiCall({ action: 'get_admin_data', token }).then(res => {
            const format = (m) => m && m.length > 1 ? m.slice(1).map(r => { let o={}; m[0].forEach((h,i)=>o[h]=r[i]); return o; }) : [];
            setData({ gym: format(res.gym), badminton: format(res.badminton), pool: format(res.pool), logs: format(res.logs) });
            setLoading(false);
        });
    }, [token]);

    const combinedMembers = useMemo(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        let all = [...data.gym.map(m => ({ ...m, type: 'Gym' })), ...data.badminton.map(m => ({ ...m, type: 'Badminton' }))];
        return all.map(m => {
            if(!m.End_Date) return { ...m, daysLeft: 999 };
            const daysLeft = Math.ceil((new Date(m.End_Date) - today) / (1000 * 60 * 60 * 24));
            return { ...m, daysLeft };
        }).filter(m => m.Player_Name).sort((a, b) => a.daysLeft - b.daysLeft);
    }, [data.gym, data.badminton]);

    const actionDeactivate = async (type, id) => {
        if(!confirm("Expire this user?")) return;
        await apiCall({ action: 'deactivate_member', sheetName: type==='Gym'?'Gym_Members':'Badminton_Members', memberId: id, token });
        alert("Deactivated."); window.location.reload();
    };

    if (loading) return <div className="flex flex-col items-center justify-center h-full text-accent space-y-4"><div className="w-10 h-10 border-4 border-current border-t-transparent rounded-full animate-spin"></div><p className="font-bold">Loading Data...</p></div>;

    return (
        <div className="flex flex-col space-y-6">
            {/* HORIZONTAL SCROLLING WIDGETS */}
            <div className="flex overflow-x-auto hide-scroll space-x-4 snap-x pb-2">
                <div className="snap-center shrink-0 w-64 glass-panel p-5 rounded-2xl border-l-4 border-accent">
                    <p className="text-gray-400 text-sm font-bold uppercase">Active Gym</p>
                    <h2 className="text-5xl font-black text-white mt-1">{data.gym.filter(g=>g.Status==='Active').length}</h2>
                </div>
                <div className="snap-center shrink-0 w-64 glass-panel p-5 rounded-2xl border-l-4 border-emerald">
                    <p className="text-gray-400 text-sm font-bold uppercase">Active Badminton</p>
                    <h2 className="text-5xl font-black text-white mt-1">{data.badminton.filter(b=>b.Status==='Active').length}</h2>
                </div>
                <div className="snap-center shrink-0 w-64 glass-panel p-5 rounded-2xl border-l-4 border-cyanPool">
                    <p className="text-gray-400 text-sm font-bold uppercase">Pool Swimmers</p>
                    <h2 className="text-5xl font-black text-white mt-1">{data.pool.length}</h2>
                </div>
            </div>

            {/* EXPIRY CARDS (Replaces Desktop Table) */}
            <div>
                <h3 className="text-lg font-black text-white mb-3">Live Expiry Radar</h3>
                <div className="space-y-4">
                    {combinedMembers.map((m, idx) => (
                        <div key={idx} className={`bg-gray-900 rounded-xl p-4 border-l-4 shadow-lg ${m.daysLeft <= 0 ? 'border-crimson bg-red-900/10' : m.daysLeft <= 3 ? 'border-amber bg-amber-900/10' : 'border-gray-700'}`}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <h4 className="text-white font-bold text-lg">{m.Player_Name}</h4>
                                    <span className={`px-2 py-0.5 rounded text-xs font-bold mt-1 inline-block ${m.type==='Gym'?'bg-blue-900/50 text-blue-400':'bg-emerald-900/50 text-emerald-400'}`}>{m.type}</span>
                                </div>
                                <div className="text-right">
                                    {m.daysLeft <= 0 ? <span className="text-crimson font-black text-sm block">Expired</span> : 
                                     m.daysLeft <= 3 ? <span className="text-amber font-black text-sm block">{m.daysLeft}d left</span> : 
                                     <span className="text-gray-400 font-bold text-sm block">{m.daysLeft}d left</span>}
                                    <span className="text-xs text-gray-500 mt-1 block">{new Date(m.End_Date).toLocaleDateString()}</span>
                                </div>
                            </div>
                            <div className="mt-4 flex space-x-2">
                                <a href={`tel:${m.Mobile_Number}`} className="flex-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 flex items-center justify-center py-3 rounded-lg text-accent font-bold transition-colors"><Icons.Phone /></a>
                                <a href={`https://wa.me/91${m.Mobile_Number}`} target="_blank" className="flex-1 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 flex items-center justify-center py-3 rounded-lg text-emerald font-bold transition-colors"><Icons.Message /></a>
                                <button onClick={()=>actionDeactivate(m.type, m.Member_ID)} className="bg-gray-800 active:bg-crimson px-5 flex items-center justify-center rounded-lg text-gray-400 active:text-white transition-colors"><Icons.X /></button>
                            </div>
                        </div>
                    ))}
                    {combinedMembers.length === 0 && <p className="text-center text-gray-500 py-6">No data available.</p>}
                </div>
            </div>
        </div>
    );
};

// ============================================================================
// SHARED GYM / BADMINTON COMPONENT GENERATOR (Mobile List Views)
// ============================================================================
const DepartmentManager = ({ type, token }) => {
    const isGym = type === 'Gym';
    const colorClass = isGym ? 'accent' : 'emerald';
    const hexColor = isGym ? 'text-accent' : 'text-emerald';
    const bgClass = isGym ? 'bg-accent hover:bg-blue-600' : 'bg-emerald hover:bg-emerald-600';

    const [members, setMembers] = useState([]);
    const [isFormOpen, setIsFormOpen] = useState(false);
    const [loading, setLoading] = useState(false);
    const [formData, setFormData] = useState(isGym ? { name:'', phone:'', address:'', start:new Date().toISOString().split('T')[0], duration:'1 Month' } : { name:'', phone:'', category:'Over 15', start:new Date().toISOString().split('T')[0] });

    useEffect(() => { loadData(); }, []);
    const loadData = () => apiCall({ action: isGym?'get_gym_data':'get_badminton_data', token }).then(res=>{
        const format = res.length>1 ? res.slice(1).map(r=>{let o={}; res[0].forEach((h,i)=>o[h]=r[i]); return o;}) : [];
        setMembers(format);
    });

    const submit = async (e) => {
        e.preventDefault(); setLoading(true);
        let payload = { Member_ID: `${isGym?'GYM':'BAD'}-${Date.now()}`, Player_Name: formData.name, Mobile_Number: formData.phone, Start_Date: formData.start, Status: 'Active', Total_Revenue_Generated: 0 };
        
        if(isGym) {
            let d = new Date(formData.start); d.setMonth(d.getMonth() + parseInt(formData.duration.split(' ')[0]));
            payload = { ...payload, Address_Location: formData.address, End_Date: d.toISOString().split('T')[0] };
        } else {
            let d = new Date(formData.start); d.setDate(d.getDate() + 30);
            payload = { ...payload, Category: formData.category, Fee_Paid: formData.category==='Over 15'?500:formData.category==='Under 15'?150:200, End_Date: d.toISOString().split('T')[0] };
        }

        await apiCall({ action: isGym?'add_gym_member':'add_badminton_member', data: payload, token });
        setIsFormOpen(false); setLoading(false); loadData();
    };

    return (
        <div className="flex flex-col h-full space-y-4">
            <button onClick={()=>setIsFormOpen(true)} className={`w-full ${bgClass} text-white font-black py-4 rounded-2xl flex justify-center items-center gap-2 shadow-lg active:scale-95 transition-transform`}>
                <Icons.Plus /> Register New {isGym ? 'Member' : 'Player'}
            </button>
            
            <div className="flex justify-between items-center px-1 mt-2">
                <span className="text-gray-400 font-bold">Total Active</span>
                <span className={`text-2xl font-black ${hexColor}`}>{members.filter(m=>m.Status==='Active').length}</span>
            </div>

            <div className="space-y-3 pb-10">
                {members.map((m, i) => (
                    <div key={i} className={`bg-gray-900 p-4 rounded-xl border border-gray-800 shadow-md ${m.Status!=='Active'?'opacity-50':''}`}>
                        <div className="flex justify-between">
                            <h4 className="text-white font-bold">{m.Player_Name}</h4>
                            <span className={`text-xs px-2 py-1 rounded font-bold ${m.Status==='Active'?`bg-${colorClass}/20 ${hexColor}`:'bg-crimson/20 text-crimson'}`}>{m.Status}</span>
                        </div>
                        <p className="text-gray-400 text-sm mt-1">{m.Mobile_Number}</p>
                        <div className="mt-3 pt-3 border-t border-gray-800 flex justify-between text-xs font-bold text-gray-500">
                            <span>{isGym ? 'Expires:' : m.Category}</span>
                            <span className="text-white">{new Date(m.End_Date).toLocaleDateString()}</span>
                        </div>
                    </div>
                ))}
            </div>

            <BottomSheet isOpen={isFormOpen} onClose={()=>setIsFormOpen(false)} title={`New ${isGym?'Member':'Player'}`}>
                <form onSubmit={submit} className="space-y-4">
                    <input required placeholder="Full Name *" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none focus:border-white transition-colors" />
                    <input required type="tel" pattern="[0-9]{10}" placeholder="Mobile Number (10 Digits) *" value={formData.phone} onChange={e=>setFormData({...formData, phone:e.target.value})} className="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none focus:border-white transition-colors" />
                    
                    {isGym && <input required placeholder="Address *" value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none" />}
                    {!isGym && <select value={formData.category} onChange={e=>setFormData({...formData, category:e.target.value})} className="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none"><option>Over 15</option><option>Under 15</option><option>Twice a Week</option></select>}
                    
                    <div className="flex space-x-2">
                        <input required type="date" value={formData.start} onChange={e=>setFormData({...formData, start:e.target.value})} className="flex-1 bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none" />
                        {isGym && <select value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} className="flex-1 bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none"><option>1 Month</option><option>3 Months</option><option>6 Months</option></select>}
                    </div>

                    <button type="submit" disabled={loading} className={`w-full mt-6 ${bgClass} text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform`}>{loading?'Saving...':'Confirm Registration'}</button>
                </form>
            </BottomSheet>
        </div>
    );
};
const GymManagement = (props) => <DepartmentManager type="Gym" {...props} />;
const BadmintonManagement = (props) => <DepartmentManager type="Badminton" {...props} />;

// ============================================================================
// MODULE 4: SWIMMING POOL (Segmented Mobile Interface)
// ============================================================================
const SwimmingPool = ({ token }) => {
    const [view, setView] = useState('live'); // 'checkin' | 'live' | 'stats'
    
    const [swimmers, setSwimmers] = useState([]);
    const [metrics, setMetrics] = useState({ todayRev: 0, itemsOut: 0, discounts: 0 });
    
    // Check-in Form State
    const [form, setForm] = useState({ name: '', phone: '', airTube: false, waterGoggles: false });
    const [discountStatus, setDiscountStatus] = useState(false);
    const [isChecking, setIsChecking] = useState(false);
    const [checkingIn, setCheckingIn] = useState(false);
    const videoRef = useRef(null);
    const [photoData, setPhotoData] = useState(null);

    // Rental Modal State
    const [modal, setModal] = useState({ isOpen: false, id: null, item: null });

    useEffect(() => {
        setSwimmers(JSON.parse(localStorage.getItem('pool_active') || '[]'));
        setMetrics(JSON.parse(localStorage.getItem('pool_metrics') || '{"todayRev":0,"itemsOut":0,"discounts":0}'));
    }, []);

    useEffect(() => {
        localStorage.setItem('pool_active', JSON.stringify(swimmers));
        localStorage.setItem('pool_metrics', JSON.stringify(metrics));
    }, [swimmers, metrics]);

    // Timer Engine
    useEffect(() => {
        const i = setInterval(() => {
            setSwimmers(prev => prev.map(s => {
                const elapsed = Math.floor((Date.now() - s.entryTime) / 1000);
                const left = Math.max(3600 - elapsed, 0);
                if (left === 0 && !s.alarmTriggered) {
                    if('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(`${s.name}, time up.`));
                    if('navigator' in window && navigator.vibrate) navigator.vibrate([200,100,200]);
                    return { ...s, timeLeft: left, alarmTriggered: true };
                }
                return { ...s, timeLeft: left };
            }));
        }, 1000);
        return () => clearInterval(i);
    }, []);

    const initCamera = async () => { try { videoRef.current.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } }); } catch(e){ alert("Camera required."); }};
    const takePhoto = () => { if(videoRef.current){ const c = document.createElement('canvas'); c.width=300; c.height=300; c.getContext('2d').drawImage(videoRef.current,0,0,300,300); setPhotoData(c.toDataURL('image/jpeg', 0.8)); videoRef.current.srcObject.getTracks().forEach(t=>t.stop()); }};

    const handlePhone = async (e) => {
        const val = e.target.value; setForm({...form, phone: val});
        if(val.length === 10) {
            setIsChecking(true);
            try { setDiscountStatus((await apiCall({ action: 'pool_cross_check', mobile: val, token })).discount); } catch(e){}
            setIsChecking(false);
        } else setDiscountStatus(false);
    };

    const calcBill = () => { let b = 50; if(discountStatus) b-=10; if(form.airTube) b+=10; if(form.waterGoggles) b+=10; return b; };

    const checkIn = async () => {
        if(!form.name) return alert("Name required."); setCheckingIn(true);
        const entryId = 'POOL-'+Date.now(); const bill = calcBill();
        if(photoData) localStorage.setItem(`photo_${entryId}`, photoData);
        
        let purchased = []; if(form.airTube) purchased.push('airTube'); if(form.waterGoggles) purchased.push('waterGoggles');
        const s = { id: entryId, name: form.name, phone: form.phone, entryTime: Date.now(), timeLeft: 3600, alarmTriggered: false, bill, hasPhoto: !!photoData, purchasedItems: purchased };

        try {
            await apiCall({ action: 'pool_check_in', token, data: { Entry_ID: entryId, Player_Name: form.name, Mobile_Number: form.phone, Entry_Time: new Date().toISOString(), Local_Photo_Path: 'LOCAL', Is_Discount_Applied: discountStatus, Final_Bill_Amount: bill }});
            setSwimmers([...swimmers, s]); setMetrics(m => ({ ...m, todayRev: m.todayRev+bill, discounts: m.discounts+(discountStatus?1:0) }));
            setForm({ name: '', phone: '', airTube: false, waterGoggles: false }); setPhotoData(null); setDiscountStatus(false); setView('live');
        } catch(e) { alert("Error Check-in."); } finally { setCheckingIn(false); }
    };

    const exit = (id) => { apiCall({action: 'pool_exit', entryId: id, token}); localStorage.removeItem(`photo_${id}`); setSwimmers(swimmers.filter(s=>s.id!==id)); };

    const confirmRental = () => {
        if(!modal.item) return; const price = 10;
        apiCall({ action: 'pool_update_items', data: { Entry_ID: modal.id, addedAmount: price, Item_Name: modal.item }, token });
        setSwimmers(swimmers.map(s => s.id === modal.id ? { ...s, bill: s.bill + price, purchasedItems: [...s.purchasedItems, modal.item] } : s));
        setMetrics(m => ({ ...m, todayRev: m.todayRev + price, itemsOut: m.itemsOut + 1 }));
        setModal({isOpen: false, id: null, item: null});
    };

    const activeModalSwimmer = modal.id ? swimmers.find(s => s.id === modal.id) : null;

    return (
        <div className="flex flex-col h-full">
            {/* SEGMENTED TAB NAVIGATION */}
            <div className="flex bg-gray-900 rounded-xl p-1 mb-5 shrink-0 shadow-inner border border-gray-800">
                <button onClick={()=>setView('checkin')} className={`flex-1 py-3 text-sm font-bold rounded-lg transition-colors ${view==='checkin'?'bg-cyanPool text-white shadow-md':'text-gray-400'}`}>Gatekeeper</button>
                <button onClick={()=>setView('live')} className={`flex-1 py-3 text-sm font-bold rounded-lg transition-colors ${view==='live'?'bg-cyanPool text-white shadow-md':'text-gray-400'}`}>Live Pool ({swimmers.length})</button>
                <button onClick={()=>setView('stats')} className={`flex-1 py-3 text-sm font-bold rounded-lg transition-colors ${view==='stats'?'bg-cyanPool text-white shadow-md':'text-gray-400'}`}>Audit</button>
            </div>

            {/* VIEWS */}
            <div className="flex-1 overflow-y-auto hide-scroll pb-10">
                
                {/* 1. CHECK-IN TAB */}
                {view === 'checkin' && (
                    <div className="space-y-4 slide-up">
                        <input required value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Player Name *" className="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-white font-bold outline-none focus:border-cyanPool" />
                        <div>
                            <input type="tel" maxLength="10" value={form.phone} onChange={handlePhone} placeholder="Mobile Number (Checks Discount)" className="w-full bg-gray-900 border border-gray-700 p-4 rounded-xl text-white outline-none focus:border-cyanPool" />
                            {isChecking && <p className="text-cyanPool text-xs font-bold mt-1 ml-1 animate-pulse">Cross-checking database...</p>}
                        </div>
                        
                        {discountStatus && <div className="bg-emerald-900/40 border border-emerald text-emerald-400 p-3 rounded-xl text-sm font-black text-center shadow-lg animate-pulse">✅ ₹10 DISCOUNT APPLIED</div>}

                        <div className="border border-gray-800 rounded-xl p-4 bg-gray-900 flex flex-col items-center justify-center min-h-[160px]">
                            {!photoData ? (
                                <div className="flex flex-col items-center w-full">
                                    <video ref={videoRef} autoPlay playsInline className="w-full h-40 bg-black rounded-lg object-cover mb-3"></video>
                                    <div className="flex gap-2 w-full">
                                        <button onClick={initCamera} className="flex-1 bg-gray-800 text-white py-3 rounded-lg font-bold">Start Cam</button>
                                        <button onClick={takePhoto} className="flex-1 bg-cyanPool text-white py-3 rounded-lg font-bold shadow-lg">Snap</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="w-full text-center">
                                    <img src={photoData} className="w-32 h-32 mx-auto rounded-full object-cover border-4 border-cyanPool shadow-lg mb-3" />
                                    <button onClick={()=>{setPhotoData(null); initCamera();}} className="text-crimson font-bold">Retake Photo</button>
                                </div>
                            )}
                        </div>

                        <div className="bg-gray-900 rounded-xl p-4 border border-gray-800 flex justify-around">
                            <label className="flex flex-col items-center space-y-2 text-white font-bold"><input type="checkbox" checked={form.airTube} onChange={e=>setForm({...form, airTube: e.target.checked})} className="w-6 h-6 accent-cyanPool" /><span>Air Tube <span className="text-gray-400 text-xs">+₹10</span></span></label>
                            <label className="flex flex-col items-center space-y-2 text-white font-bold"><input type="checkbox" checked={form.waterGoggles} onChange={e=>setForm({...form, waterGoggles: e.target.checked})} className="w-6 h-6 accent-cyanPool" /><span>Goggles <span className="text-gray-400 text-xs">+₹10</span></span></label>
                        </div>

                        <button onClick={checkIn} disabled={checkingIn} className="w-full bg-cyanPool hover:bg-cyan-500 text-white font-black py-5 rounded-xl text-xl shadow-[0_4px_20px_rgba(6,182,212,0.4)] active:scale-95 transition-all flex justify-between px-6 mt-4">
                            <span>{checkingIn ? "PROCESSING..." : "CHECK-IN"}</span>
                            <span>₹{calcBill()}</span>
                        </button>
                    </div>
                )}

                {/* 2. LIVE POOL TAB */}
                {view === 'live' && (
                    <div className="space-y-4 slide-up">
                        {swimmers.map(s => (
                            <div key={s.id} className={`bg-gray-900 rounded-2xl p-4 border flex flex-col shadow-lg ${s.timeLeft===0?'border-crimson bg-red-900/10 pulse-red':'border-gray-800'}`}>
                                <div className="flex items-center justify-between mb-2">
                                    <div className="flex items-center gap-3">
                                        {s.hasPhoto ? <img src={localStorage.getItem(`photo_${s.id}`) || ''} className="w-14 h-14 rounded-full object-cover border-2 border-gray-700" /> : <div className="w-14 h-14 bg-gray-800 rounded-full flex items-center justify-center text-gray-500"><Icons.User /></div>}
                                        <div>
                                            <h4 className="text-white font-black text-xl">{s.name}</h4>
                                            <span className="bg-gray-800 text-cyanPool font-bold text-xs px-2 py-1 rounded mt-1 inline-block">Bill: ₹{s.bill}</span>
                                        </div>
                                    </div>
                                    <div className={`text-3xl font-black font-mono tracking-tighter ${s.timeLeft===0?'text-crimson animate-bounce':'text-cyanPool'}`}>
                                        {Math.floor(s.timeLeft/60).toString().padStart(2,'0')}:{(s.timeLeft%60).toString().padStart(2,'0')}
                                    </div>
                                </div>
                                <div className="flex gap-2 mt-3">
                                    <button onClick={()=>setModal({isOpen:true, id:s.id, item:null})} className="flex-1 bg-gray-800 active:bg-gray-700 font-bold text-sm py-3 rounded-xl text-white flex justify-center items-center gap-2"><Icons.Cart /> Add Rental</button>
                                    <button onClick={()=>exit(s.id)} className="flex-1 bg-crimson active:bg-red-700 font-bold text-sm py-3 rounded-xl text-white">Exit & Clear</button>
                                </div>
                            </div>
                        ))}
                        {swimmers.length===0 && <div className="text-center text-gray-500 py-10 font-bold text-lg">Pool is Empty</div>}
                    </div>
                )}

                {/* 3. STATS TAB */}
                {view === 'stats' && (
                    <div className="space-y-4 slide-up">
                        <div className="glass-panel p-6 rounded-2xl border-l-4 border-cyanPool"><p className="text-gray-400 text-sm font-bold uppercase">Today's Revenue</p><h2 className="text-5xl font-black text-white mt-1">₹{metrics.todayRev}</h2></div>
                        <div className="glass-panel p-6 rounded-2xl border-l-4 border-amber"><p className="text-gray-400 text-sm font-bold uppercase">Items Rented Out</p><h2 className="text-5xl font-black text-white mt-1">{metrics.itemsOut}</h2></div>
                        <div className="glass-panel p-6 rounded-2xl border-l-4 border-emerald"><p className="text-gray-400 text-sm font-bold uppercase">Discounts Granted</p><h2 className="text-5xl font-black text-white mt-1">{metrics.discounts}</h2></div>
                    </div>
                )}
            </div>

            {/* ANTI-SPAM RENTAL BOTTOM SHEET */}
            <BottomSheet isOpen={modal.isOpen} onClose={()=>setModal({isOpen:false, id:null, item:null})} title={`Rent to ${activeModalSwimmer?.name}`}>
                {activeModalSwimmer && (
                    <div className="space-y-4">
                        <button disabled={activeModalSwimmer.purchasedItems.includes('airTube')} onClick={()=>setModal({...modal, item:'airTube'})} className={`w-full flex justify-between p-5 rounded-xl border font-bold text-lg transition-all ${activeModalSwimmer.purchasedItems.includes('airTube')?'bg-gray-800 border-gray-700 text-gray-500':'bg-gray-900 border-gray-700 text-white'} ${modal.item==='airTube'?'border-cyanPool bg-cyanPool/20':''}`}>
                            <span>Air Tube</span> <span>{activeModalSwimmer.purchasedItems.includes('airTube')?'Rented':'+ ₹10'}</span>
                        </button>
                        <button disabled={activeModalSwimmer.purchasedItems.includes('waterGoggles')} onClick={()=>setModal({...modal, item:'waterGoggles'})} className={`w-full flex justify-between p-5 rounded-xl border font-bold text-lg transition-all ${activeModalSwimmer.purchasedItems.includes('waterGoggles')?'bg-gray-800 border-gray-700 text-gray-500':'bg-gray-900 border-gray-700 text-white'} ${modal.item==='waterGoggles'?'border-cyanPool bg-cyanPool/20':''}`}>
                            <span>Water Goggles</span> <span>{activeModalSwimmer.purchasedItems.includes('waterGoggles')?'Rented':'+ ₹10'}</span>
                        </button>
                        <button onClick={confirmRental} disabled={!modal.item} className={`w-full py-4 mt-4 rounded-xl font-black text-lg ${modal.item?'bg-cyanPool text-white shadow-lg':'bg-gray-800 text-gray-500'}`}>Confirm & Charge</button>
                    </div>
                )}
            </BottomSheet>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
